<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <meta name="screen-orientation" content="landscape">
  <meta name="x5-orientation" content="landscape">
  <meta name="full-screen" content="yes">
  <title>Killer: Night Survival</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#0e0018 0%,#0a000f 50%,#050008 100%);}
    body{
      width:100vw;height:100vh;height:100dvh;overflow:hidden;background:linear-gradient(180deg,#0e0018 0%,#0a000f 50%,#050008 100%);
      font-family:'Rajdhani','Segoe UI',Arial,sans-serif;
      user-select:none;-webkit-user-select:none;touch-action:none;
    }
    #rotate-hint{
      display:none;position:fixed;inset:0;z-index:99990;
      background:rgba(0,0,0,0.96);
      flex-direction:column;justify-content:center;align-items:center;gap:24px;
    }
    #rotate-hint.show{display:flex}
    #rotate-hint .rh-icon{font-size:56px;animation:pulse 1.5s infinite}
    #rotate-hint .rh-text{color:#fff;font-size:22px;font-weight:700;font-family:'Rajdhani',Arial;text-align:center;line-height:1.4}

    #game-wrapper{
      position:fixed;width:960px;height:540px;overflow:hidden;background:#050510;
      transform-origin:0 0;
    }
    canvas{display:block;}
    #ui-overlay{
      position:absolute;top:12px;left:12px;right:12px;pointer-events:none;
      display:flex;justify-content:space-between;align-items:flex-start;
      gap:6px;flex-wrap:wrap;z-index:20
    }
    .ui-badge{
      pointer-events:auto;background:rgba(0,0,0,0.85);border:1px solid #555;border-radius:20px;
      padding:7px 14px;color:#fff;font-size:1.1rem;font-weight:600;
      backdrop-filter:blur(6px);white-space:nowrap
    }
    #no-connection{display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.92);flex-direction:column;justify-content:center;align-items:center;gap:20px;padding:16px;box-sizing:border-box}
    #no-connection.show{display:flex}
    #no-connection .nc-box{background:linear-gradient(135deg,#1a0005,#0d000a);border:2px solid #8b0000;border-radius:20px;padding:28px 24px;text-align:center;box-shadow:0 0 40px rgba(180,0,30,0.6),inset 0 0 20px rgba(180,0,30,0.1);max-width:min(340px,90vw);width:100%;box-sizing:border-box}
    #no-connection .nc-icon{font-size:clamp(36px,8vw,56px);margin-bottom:10px;animation:pulse 1.5s infinite}
    #no-connection .nc-title{color:#ff2244;font-size:clamp(18px,5vw,28px);font-weight:700;font-family:'Rajdhani',Arial;margin-bottom:6px;text-shadow:0 0 12px #ff0033}
    #no-connection .nc-sub{color:#cc8888;font-size:clamp(12px,3.5vw,16px);font-family:'Rajdhani',Arial;margin-bottom:18px;line-height:1.4}
    #no-connection .nc-btn{background:linear-gradient(135deg,#8b0000,#cc0000);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:clamp(14px,4vw,18px);font-family:'Rajdhani',Arial;font-weight:700;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(180,0,30,0.5);transition:all 0.2s;text-transform:uppercase}
    #no-connection .nc-btn:hover{background:linear-gradient(135deg,#aa0000,#ff1111);box-shadow:0 6px 30px rgba(255,0,30,0.7);transform:translateY(-2px)}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.95)}}
    #player-id-badge{
      display:none;
      position:fixed;top:10px;left:10px;z-index:99995;
      background:rgba(0,0,0,0.9);border:2px solid #8b0000;border-radius:14px;
      padding:6px 14px 7px;pointer-events:none;white-space:nowrap;
      backdrop-filter:blur(6px);user-select:none;-webkit-user-select:none;
      box-shadow:0 0 12px rgba(180,0,30,0.4);
    }
    #player-id-badge .pid-label{
      display:block;color:#cc5555;font-size:0.62rem;font-weight:700;
      font-family:'Rajdhani','Segoe UI',Arial,sans-serif;
      letter-spacing:2px;text-transform:uppercase;line-height:1;margin-bottom:2px;
    }
    #player-id-badge .pid-value{
      display:block;color:#ffffff;font-size:1.15rem;font-weight:700;
      font-family:'Rajdhani','Segoe UI',Arial,sans-serif;
      letter-spacing:4px;line-height:1;text-shadow:0 0 8px rgba(255,80,80,0.5);
    }
  </style>
</head>
<body>
<div id="player-id-badge"><span class="pid-label">Player ID</span><span class="pid-value" id="pid-value">------</span></div>
<div id="rotate-hint">
  <div class="rh-icon">📱</div>
  <div class="rh-text" id="rh-text">Поверни телефон горизонтально</div>
</div>
<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="ui-overlay"></div>
</div>
<div id="no-connection">
  <div class="nc-box">
    <div class="nc-icon">📡</div>
    <div class="nc-title" id="nc-title">Нет подключения</div>
    <div class="nc-sub" id="nc-sub">Проверьте интернет и попробуйте снова</div>
    <button class="nc-btn" id="nc-btn" onclick="location.reload()">Перезагрузить</button>
  </div>
</div>
<!-- ====== AUTH OVERLAY ====== -->
<div id="auth-overlay" style="display:flex;position:fixed;inset:0;z-index:99998;background:linear-gradient(180deg,#0e0018 0%,#0a000f 60%,#050008 100%);justify-content:center;align-items:center;flex-direction:column;gap:0;">
  <div style="text-align:center;margin-bottom:18px;pointer-events:none;">
    <div id="auth-game-title" style="font-family:Impact,Arial;font-size:clamp(28px,7vw,54px);color:#ff2244;text-shadow:0 0 30px #ff0033,0 0 8px #ff4466;letter-spacing:3px;">КИЛЛЕР</div>
    <div style="font-family:Impact,Arial;font-size:clamp(14px,3.5vw,26px);color:#ff7788;letter-spacing:2px;margin-top:4px;">ВЫЖИВАНИЕ</div>
  </div>
  <div id="auth-box" style="background:linear-gradient(135deg,#1a0008,#0d0018);border:2px solid #8b0000;border-radius:22px;padding:clamp(18px,4vw,32px) clamp(18px,5vw,40px);box-shadow:0 0 50px rgba(180,0,30,0.5),inset 0 0 20px rgba(180,0,30,0.07);width:min(380px,92vw);box-sizing:border-box;">

    <!-- TABS -->
    <div style="display:flex;gap:0;margin-bottom:22px;border-radius:12px;overflow:hidden;border:1.5px solid #440011;">
      <button id="tab-login" onclick="authTab('login')" style="flex:1;padding:10px 0;font-family:'Rajdhani',Arial;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:all .2s;background:#6a0000;color:#ffaaaa;letter-spacing:1px;">ВХОД</button>
      <button id="tab-register" onclick="authTab('register')" style="flex:1;padding:10px 0;font-family:'Rajdhani',Arial;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:all .2s;background:#1a0008;color:#884444;letter-spacing:1px;">РЕГИСТРАЦИЯ</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div style="margin-bottom:12px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">EMAIL</div>
        <input id="li-email" type="email" placeholder="твой@email.com" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;transition:border .2s;" onfocus="this.style.borderColor='#dd2255'" onblur="this.style.borderColor='#440011'"/>
      </div>
      <div style="margin-bottom:16px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">ПАРОЛЬ</div>
        <input id="li-pass" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;transition:border .2s;" onfocus="this.style.borderColor='#dd2255'" onblur="this.style.borderColor='#440011'" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div id="li-err" style="color:#ff4466;font-size:13px;font-family:'Rajdhani',Arial;min-height:18px;margin-bottom:10px;text-align:center;"></div>
      <button onclick="doLogin()" id="li-btn" style="width:100%;padding:12px;background:linear-gradient(135deg,#8b0000,#cc0000);color:#fff;border:none;border-radius:12px;font-size:18px;font-family:'Rajdhani',Arial;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(180,0,30,0.4);transition:all .2s;" onmouseover="this.style.background='linear-gradient(135deg,#aa0000,#ff1111)'" onmouseout="this.style.background='linear-gradient(135deg,#8b0000,#cc0000)'">ВОЙТИ</button>
      <div style="text-align:center;margin-top:14px;">
        <button onclick="authTab('forgot')" style="background:none;border:none;color:#884466;font-family:'Rajdhani',Arial;font-size:14px;cursor:pointer;text-decoration:underline;">Забыл пароль?</button>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none;">
      <div style="margin-bottom:11px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">EMAIL</div>
        <input id="re-email" type="email" placeholder="твой@email.com" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;transition:border .2s;" onfocus="this.style.borderColor='#dd2255'" onblur="this.style.borderColor='#440011'"/>
      </div>
      <div style="margin-bottom:11px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;">НИК</div>
          <div id="re-nick-status" style="font-size:12px;font-family:'Rajdhani',Arial;"></div>
        </div>
        <input id="re-nick" type="text" maxlength="20" placeholder="Твой ник в игре" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;transition:border .2s;" onfocus="this.style.borderColor='#dd2255'" onblur="this.style.borderColor='#440011'"/>
      </div>
      <div style="margin-bottom:11px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">ПАРОЛЬ</div>
        <input id="re-pass" type="password" placeholder="минимум 6 символов" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;transition:border .2s;" onfocus="this.style.borderColor='#dd2255'" onblur="this.style.borderColor='#440011'"/>
      </div>
      <div style="margin-bottom:14px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">ПОВТОРИ ПАРОЛЬ</div>
        <input id="re-pass2" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;transition:border .2s;" onfocus="this.style.borderColor='#dd2255'" onblur="this.style.borderColor='#440011'" onkeydown="if(event.key==='Enter')doRegister()"/>
      </div>
      <div id="re-err" style="color:#ff4466;font-size:13px;font-family:'Rajdhani',Arial;min-height:18px;margin-bottom:10px;text-align:center;"></div>
      <button onclick="doRegister()" id="re-btn" style="width:100%;padding:12px;background:linear-gradient(135deg,#004a8b,#0066cc);color:#fff;border:none;border-radius:12px;font-size:18px;font-family:'Rajdhani',Arial;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(0,80,180,0.4);transition:all .2s;" onmouseover="this.style.background='linear-gradient(135deg,#0066aa,#0088ff)'" onmouseout="this.style.background='linear-gradient(135deg,#004a8b,#0066cc)'">СОЗДАТЬ АККАУНТ</button>
    </div>

    <!-- FORGOT FORM (шаг 1: ввод email) -->
    <div id="form-forgot" style="display:none;">
      <div style="color:#aaa;font-size:14px;font-family:'Rajdhani',Arial;text-align:center;margin-bottom:14px;line-height:1.5;">Введи email аккаунта — отправим код восстановления</div>
      <div style="margin-bottom:14px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">EMAIL</div>
        <input id="fo-email" type="email" placeholder="твой@email.com" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;" onkeydown="if(event.key==='Enter')doForgot()"/>
      </div>
      <div id="fo-err" style="color:#ff4466;font-size:13px;font-family:'Rajdhani',Arial;min-height:18px;margin-bottom:10px;text-align:center;"></div>
      <button onclick="doForgot()" id="fo-btn" style="width:100%;padding:12px;background:linear-gradient(135deg,#5a4000,#8a6500);color:#ffd700;border:none;border-radius:12px;font-size:17px;font-family:'Rajdhani',Arial;font-weight:700;cursor:pointer;letter-spacing:2px;margin-bottom:10px;">ОТПРАВИТЬ КОД</button>
      <div style="text-align:center;"><button onclick="authTab('login')" style="background:none;border:none;color:#884466;font-family:'Rajdhani',Arial;font-size:14px;cursor:pointer;text-decoration:underline;">← Назад</button></div>
    </div>

    <!-- RESET FORM (шаг 2: код + новый пароль) -->
    <div id="form-reset" style="display:none;">
      <div style="color:#aaa;font-size:14px;font-family:'Rajdhani',Arial;text-align:center;margin-bottom:14px;line-height:1.5;">Код отправлен на <span id="reset-email-hint" style="color:#ffd700;"></span></div>
      <div style="margin-bottom:11px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">КОД ИЗ ПИСЬМА</div>
        <input id="rs-code" type="text" maxlength="6" placeholder="123456" style="width:100%;padding:10px 14px;font-size:22px;letter-spacing:8px;text-align:center;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#ffd700;outline:none;box-sizing:border-box;"/>
      </div>
      <div style="margin-bottom:11px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">НОВЫЙ ПАРОЛЬ</div>
        <input id="rs-pass" type="password" placeholder="минимум 6 символов" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;"/>
      </div>
      <div style="margin-bottom:14px;">
        <div style="color:#cc5555;font-size:12px;font-family:'Rajdhani',Arial;font-weight:700;letter-spacing:2px;margin-bottom:5px;">ПОВТОРИ ПАРОЛЬ</div>
        <input id="rs-pass2" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;font-size:16px;font-family:'Rajdhani',Arial;border-radius:10px;border:1.5px solid #440011;background:#0d0008;color:#fff;outline:none;box-sizing:border-box;" onkeydown="if(event.key==='Enter')doReset()"/>
      </div>
      <div id="rs-err" style="color:#ff4466;font-size:13px;font-family:'Rajdhani',Arial;min-height:18px;margin-bottom:10px;text-align:center;"></div>
      <button onclick="doReset()" id="rs-btn" style="width:100%;padding:12px;background:linear-gradient(135deg,#004a00,#008800);color:#aaffaa;border:none;border-radius:12px;font-size:17px;font-family:'Rajdhani',Arial;font-weight:700;cursor:pointer;letter-spacing:2px;margin-bottom:10px;">СОХРАНИТЬ ПАРОЛЬ</button>
      <div style="text-align:center;"><button onclick="authTab('forgot')" style="background:none;border:none;color:#884466;font-family:'Rajdhani',Arial;font-size:14px;cursor:pointer;text-decoration:underline;">← Выслать новый код</button></div>
    </div>

  </div>
</div>

<!-- CHANGE NICK OVERLAY (в игре) -->
<div id="nick-overlay" style="display:none;position:fixed;inset:0;z-index:99997;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;">
  <div style="background:linear-gradient(135deg,#1a0005,#0d000a);border:2px solid #8b0000;border-radius:20px;padding:32px 40px;text-align:center;box-shadow:0 0 40px rgba(180,0,30,0.6);max-width:340px;width:92%;box-sizing:border-box;">
    <div style="color:#ff2244;font-size:20px;font-weight:700;font-family:'Rajdhani',Arial;margin-bottom:16px;" id="nick-label">Сменить ник:</div>
    <input id="nick-input" type="text" maxlength="20" style="width:100%;padding:10px 14px;font-size:18px;font-family:'Rajdhani',Arial;border-radius:10px;border:2px solid #8b0000;background:#1a0008;color:#fff;outline:none;margin-bottom:4px;box-sizing:border-box;text-align:center"/>
    <div id="nick-check-status" style="font-size:13px;font-family:'Rajdhani',Arial;min-height:18px;margin-bottom:4px;text-align:center;"></div>
    <div id="nick-error" style="color:#ff2244;font-size:13px;font-family:'Rajdhani',Arial;min-height:18px;margin-bottom:10px;text-align:center;"></div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button onclick="confirmNick()" style="background:linear-gradient(135deg,#8b0000,#cc0000);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:16px;font-family:'Rajdhani',Arial;font-weight:700;cursor:pointer;">OK</button>
      <button onclick="closeNickInput()" style="background:#333;color:#aaa;border:none;border-radius:10px;padding:10px 20px;font-size:16px;font-family:'Rajdhani',Arial;cursor:pointer;">✕</button>
    </div>
  </div>
</div>
<script>
(function(){
  // ====== PERSISTENT PLAYER ID ======
  const PID_KEY='killer_pid_v1';
  let PLAYER_ID=(function(){
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    function gen(){return Array.from({length:6},()=>chars[Math.floor(Math.random()*chars.length)]).join('');}
    let pid=null;
    try{pid=localStorage.getItem(PID_KEY);}catch(e){}
    if(!pid){try{pid=sessionStorage.getItem(PID_KEY);}catch(e){}}
    if(!pid){try{let m=document.cookie.match(/killer_pid=([A-Z0-9]{6})/);if(m)pid=m[1];}catch(e){}}
    if(!pid)pid=gen();
    try{localStorage.setItem(PID_KEY,pid);}catch(e){}
    try{sessionStorage.setItem(PID_KEY,pid);}catch(e){}
    try{document.cookie='killer_pid='+pid+';max-age=31536000;path=/';}catch(e){}
    return pid;
  })();
  document.getElementById('pid-value').textContent=PLAYER_ID;
  // ====== END PLAYER ID ======
  function checkOnline(){
    let nc=document.getElementById('no-connection');
    if(!navigator.onLine){nc.classList.add('show');}else{nc.classList.remove('show');}
  }
  window.addEventListener('online',checkOnline);
  window.addEventListener('offline',checkOnline);
  checkOnline();

  const canvas=document.getElementById('gameCanvas');
  const ctx=canvas.getContext('2d');
  const wrapper=document.getElementById('game-wrapper');
  const uiOverlay=document.getElementById('ui-overlay');
  const W=960,H=540;
  // Use devicePixelRatio for crisp rendering on HiDPI/mobile screens
  const DPR=Math.min(window.devicePixelRatio||1, 3);
  canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';

  const MW=1920,MH=1440;

  const LANG={
    en:{
      menuTitle:'KILLER',menuSub:'Survival',fighter:'Fighter',coins:'Coins',crystals:'Crystals',speed:'Speed',
      shop:'SHOP',leaderboard:'LEADERBOARD',settings:'SETTINGS',fighters:'FIGHTERS',cases:'CASES',
      back:'BACK',buy:'BUY',notEnough:'NOT ENOUGH',maxLevel:'MAX',nights:'Night',nightComplete:'Night done!',
      nextNight:'Next night',win:'YOU ESCAPED!',lose:'GAME OVER',caught:'Killer got you!',timeSurvived:'Time',
      earned:'Earned',menuBtn:'MENU',retry:'RETRY',stunReady:'STUN',dashReady:'DASH',poisonReady:'POISON',
      stunCd:'STUN',dashCd:'DASH',poisonCd:'POISON',upgradeSpeed:'Speed',level:'Level',nextLevel:'Next',
      cost:'cost',changeNick:'CHANGE NICK',normalMode:'PLAY',endlessMode:'ENDLESS MODE',
      bogdanBuzz:'Player',pushkin:'Einstein',toxic:'Toxic',stunAbility:'Stun 2s',poisonAbility:'Slow 2s',
      select:'SELECT',selected:'✅',locked:'🔒',mobileMode:'Phone',difficulty:'Difficulty',easy:'Easy',

  function playSfxNow(type,ac){
    let vol=(data.soundVol||0)*0.6;
    function osc(waveType,freq,gainV,dur,freqEnd,delayMs){
      let delay=(delayMs||0)/1000;
      let t0=ac.currentTime+delay;
      let o=ac.createOscillator(),g=ac.createGain();
      o.type=waveType;
      o.frequency.setValueAtTime(freq,t0);
      if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,t0+dur);
      g.gain.setValueAtTime(0.001,t0);
      g.gain.linearRampToValueAtTime(gainV*vol,t0+0.012);
      g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
      o.connect(g);g.connect(ac.destination);
      o.start(t0);o.stop(t0+dur+0.02);
    }
    function noise(gainV,dur,filterFreq){
      let len=Math.floor(ac.sampleRate*dur);
      let buf=ac.createBuffer(1,len,ac.sampleRate);
      let d=buf.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.4);
      let src=ac.createBufferSource();
      src.buffer=buf;
      let g=ac.createGain();
      g.gain.setValueAtTime(gainV*vol,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
      if(filterFreq){
        let f=ac.createBiquadFilter();
        f.type='bandpass';f.frequency.value=filterFreq;f.Q.value=1.5;
        src.connect(f);f.connect(g);
      }else{src.connect(g);}
      g.connect(ac.destination);src.start();
    }
    if(type==='dash'){
      osc('sawtooth',1200,0.45,0.06,80);
      osc('sawtooth',600,0.5,0.14,60);
      noise(0.35,0.12,1800);
      osc('sine',440,0.3,0.18,80);
    }
    else if(type==='stun'){
      osc('square',800,0.5,0.05);
      osc('square',400,0.4,0.05,200);
      noise(0.55,0.07,2000);
      osc('square',1600,0.3,0.04,100,50);
      osc('sawtooth',600,0.35,0.08,50,100);
      osc('sine',300,0.4,0.2,60,150);
    }
    else if(type==='poison'){
      osc('sine',200,0.3,0.08,400);
      osc('sine',350,0.25,0.12,180,100);
      noise(0.2,0.18,600);
      osc('sine',120,0.4,0.35,250);
      osc('triangle',280,0.2,0.25,90,150);

    else if(type==='hit'){

        o.type='sine';o.frequency.value=freq;
        g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol*0.4,t0+0.06);
        g.gain.exponentialRampToValueAtTime(0.001,t0+0.45);
        o.connect(g);g.connect(ac.destination);o.start(t0);o.stop(t0+0.5);
      });
    }
    else if(type==='menu_click'){
      osc('sine',520,0.2,0.08,780);
      osc('triangle',260,0.1,0.06,390);

    else if(type==='crate_open'){
      [350,550,850,1100,1400].forEach((freq,i)=>{
        let t0=ac.currentTime+i*0.07;
        let o=ac.createOscillator(),g=ac.createGain();
        o.type='triangle';o.frequency.value=freq;
        g.gain.setValueAtTime(vol*0.3,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.2);
        o.connect(g);g.connect(ac.destination);o.start(t0);o.stop(t0+0.22);
      });
      noise(0.3,0.15,1000);
    }

  function playMelodyNote(noteHz,dur,vol2){

    g.gain.setValueAtTime(vol2,ac.currentTime+dur*0.55);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur+0.02);
    let o2=ac.createOscillator(),g2=ac.createGain();
    o2.type='triangle';o2.frequency.value=noteHz*0.5;
    g2.gain.setValueAtTime(0,ac.currentTime);

    g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.8);

      o3.connect(g3);g3.connect(ac.destination);o3.start();o3.stop(ac.currentTime+dur);
      musicNodes.push(o3);
    }

  function stopGameMusic(){
    gameMusicPlaying=false;

  function makeReverb(ac, seconds, decay){
    // Simple convolution reverb using noise impulse
    let len=Math.floor(ac.sampleRate*seconds);
    let buf=ac.createBuffer(2,len,ac.sampleRate);
    for(let c=0;c<2;c++){
      let d=buf.getChannelData(c);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
    }
    let conv=ac.createConvolver();
    conv.buffer=buf;
    return conv;
  }

  function makeDist(ac, amount){
    let ws=ac.createWaveShaper();
    let c=new Float32Array(512);
    for(let i=0;i<512;i++){let x=i*2/512-1; c[i]=Math.tanh(x*amount);}
    ws.curve=c; ws.oversample='4x';
    return ws;
  }

  function playScaryMusic(){

    let mv=data.musicVol||0.5;
    let T=ac.currentTime;
    const DUR=12;

    function reg(node){gameMusicNodes.push(node);return node;}

    // Shared reverb bus
    let rev=makeReverb(ac,2.8,2.2);
    let revGain=ac.createGain(); revGain.gain.value=0.28;
    rev.connect(revGain); revGain.connect(ac.destination);

    function connect(node, dryGain, wetGain){
      let dg=ac.createGain(); dg.gain.value=dryGain;
      let wg=ac.createGain(); wg.gain.value=wetGain;
      node.connect(dg); dg.connect(ac.destination);
      node.connect(wg); wg.connect(rev);
    }

    // LAYER 1: Sub-bass drone 27.5 Hz
    {
      let o=reg(ac.createOscillator()), g=ac.createGain();
      let lfo=reg(ac.createOscillator()), lg=ac.createGain();
      o.type='sawtooth'; o.frequency.value=27.5;
      lfo.type='sine'; lfo.frequency.value=0.12; lg.gain.value=27.5*0.035;
      lfo.connect(lg); lg.connect(o.frequency);
      lfo.start(T); lfo.stop(T+DUR+0.1);
      g.gain.setValueAtTime(0,T); g.gain.linearRampToValueAtTime(mv*0.22,T+1.2);
      g.gain.setValueAtTime(mv*0.22,T+DUR-1.0); g.gain.linearRampToValueAtTime(0,T+DUR);
      let dist=makeDist(ac,3); o.connect(dist); dist.connect(g);
      connect(g, 0.9, 0.1);
      o.start(T); o.stop(T+DUR+0.1);
    }

    // LAYER 2: Mid drone 55 Hz
    {
      let o=reg(ac.createOscillator()), g=ac.createGain();
      o.type='square'; o.frequency.value=55;
      let lfo=reg(ac.createOscillator()), lg=ac.createGain();
      lfo.type='sine'; lfo.frequency.value=0.07; lg.gain.value=1.8;
      lfo.connect(lg); lg.connect(o.frequency);
      lfo.start(T); lfo.stop(T+DUR+0.1);
      g.gain.setValueAtTime(0,T); g.gain.linearRampToValueAtTime(mv*0.10,T+2.0);
      g.gain.setValueAtTime(mv*0.10,T+DUR-1.5); g.gain.linearRampToValueAtTime(0,T+DUR);
      let dist=makeDist(ac,1.5); o.connect(dist); dist.connect(g);
      connect(g, 0.7, 0.3);
      o.start(T); o.stop(T+DUR+0.1);
    }

    // LAYER 3: Heartbeat rhythm
    {
      const beats=[0.3,1.05,2.25,3.0,4.5,5.25,6.75,7.5,9.0,9.75,11.0,11.75];
      beats.forEach(b=>{
        if(b>=DUR)return;
        let t=T+b;
        let o=reg(ac.createOscillator()), g=ac.createGain();
        o.type='sine'; o.frequency.setValueAtTime(110,t); o.frequency.exponentialRampToValueAtTime(18,t+0.28);
        g.gain.setValueAtTime(mv*0.55,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o.connect(g); connect(g, 1.0, 0.0); o.start(t); o.stop(t+0.35);
        let n=reg(ac.createOscillator()), ng=ac.createGain();
        n.type='square'; n.frequency.setValueAtTime(90,t); n.frequency.exponentialRampToValueAtTime(20,t+0.12);
        ng.gain.setValueAtTime(mv*0.25,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.14);
        n.connect(ng); connect(ng, 1.0, 0.0); n.start(t); n.stop(t+0.16);
      });
    }

    // LAYER 4: Ghost melody — minor pentatonic A
    {
      const scale=[110,130.8,146.8,164.8,196,220,261.6,329.6,392];
      const phrase=[
        [4,0,1.5,1.0],[2,1.5,0.75,0.7],[3,2.25,0.75,0.8],[1,3.0,2.0,0.9],
        [5,5,1.5,1.1],[6,6.5,0.75,0.8],[4,7.25,0.75,0.7],[3,8.0,1.5,1.0],
        [7,9.5,0.75,0.9],[5,10.25,0.75,0.8],[4,11.0,1.0,0.6],
      ];
      const BEAT=0.75;
      phrase.forEach(([si,sb,db,vm])=>{
        let t=T+sb*BEAT; if(t-T>=DUR)return;
        let dur=Math.min(db*BEAT,T+DUR-t-0.05); if(dur<=0)return;
        let freq=scale[si];
        let o=reg(ac.createOscillator()), g=ac.createGain();
        o.type='sine'; o.frequency.value=freq;
        let vib=reg(ac.createOscillator()), vg=ac.createGain();
        vib.type='sine'; vib.frequency.value=5.5; vg.gain.value=freq*0.012;
        vib.connect(vg); vg.connect(o.frequency); vib.start(t); vib.stop(t+dur+0.05);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(mv*0.13*vm,t+0.06);
        g.gain.setValueAtTime(mv*0.13*vm,t+dur*0.7); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.connect(g); connect(g, 0.4, 0.6); o.start(t); o.stop(t+dur+0.05);
        let o2=reg(ac.createOscillator()), g2=ac.createGain();
        o2.type='triangle'; o2.frequency.value=freq*0.5;
        g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(mv*0.06*vm,t+0.08);
        g2.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o2.connect(g2); connect(g2, 0.3, 0.7); o2.start(t); o2.stop(t+dur+0.05);
      });
    }

    // LAYER 5: Choir pad
    {
      const chordFreqs=[110,130.8,146.8,174.6];
      chordFreqs.forEach((freq,i)=>{
        let t=T+i*0.18;
        let o=reg(ac.createOscillator()), g=ac.createGain();
        o.type='sine'; o.frequency.value=freq;
        let bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=700+i*180; bp.Q.value=3;
        let trem=reg(ac.createOscillator()), tg=ac.createGain();
        trem.type='sine'; trem.frequency.value=3.8+i*0.3; tg.gain.value=mv*0.025;
        trem.connect(tg); tg.connect(g.gain); trem.start(t); trem.stop(T+DUR+0.1);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(mv*0.08,t+3.5);
        g.gain.setValueAtTime(mv*0.08,T+DUR-2.0); g.gain.linearRampToValueAtTime(0,T+DUR);
        o.connect(bp); bp.connect(g); connect(g, 0.2, 0.8); o.start(t); o.stop(T+DUR+0.1);
      });
    }

    // LAYER 6: String tremolo
    {
      const stringNotes=[329.6,392,440,523.25];
      stringNotes.forEach((freq,i)=>{
        let tStart=T+2.0+i*0.4; let dur=DUR-2.0-i*0.4-0.3; if(dur<=0)return;
        let o=reg(ac.createOscillator()), g=ac.createGain();
        o.type='sawtooth'; o.frequency.value=freq;
        let hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=300;
        let lfo=reg(ac.createOscillator()), lg=ac.createGain();
        lfo.type='sine'; lfo.frequency.value=9+i*1.5; lg.gain.value=mv*0.04;
        lfo.connect(lg); lg.connect(g.gain); lfo.start(tStart); lfo.stop(tStart+dur+0.1);
        g.gain.setValueAtTime(0,tStart); g.gain.linearRampToValueAtTime(mv*0.055,tStart+0.6);
        g.gain.setValueAtTime(mv*0.055,tStart+dur-0.5); g.gain.linearRampToValueAtTime(0,tStart+dur);
        o.connect(hp); hp.connect(g); connect(g, 0.25, 0.75); o.start(tStart); o.stop(tStart+dur+0.1);
      });
    }

    // LAYER 7: Wind howl
    {
      let len=Math.floor(ac.sampleRate*DUR);
      let buf=ac.createBuffer(1,len,ac.sampleRate);
      let d=buf.getChannelData(0);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*0.8;
      let src=reg(ac.createBufferSource()); src.buffer=buf;
      let bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=8;
      bp.frequency.setValueAtTime(300,T); bp.frequency.linearRampToValueAtTime(900,T+4);
      bp.frequency.linearRampToValueAtTime(200,T+8); bp.frequency.linearRampToValueAtTime(700,T+12);
      let g=ac.createGain();
      g.gain.setValueAtTime(0,T); g.gain.linearRampToValueAtTime(mv*0.09,T+1.5);
      g.gain.setValueAtTime(mv*0.09,T+DUR-1.5); g.gain.linearRampToValueAtTime(0,T+DUR);
      src.connect(bp); bp.connect(g); connect(g, 0.3, 0.7); src.start(T); src.stop(T+DUR+0.1);
    }

    // LAYER 8: Distant screams
    {
      let numScreams=Math.random()<0.5?1:2;
      for(let s=0;s<numScreams;s++){
        let t=T+1.0+Math.random()*(DUR-4);
        let o=reg(ac.createOscillator()), g=ac.createGain();
        o.type='sawtooth';
        let f0=350+Math.random()*300;
        o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f0*(0.9+Math.random()*0.5),t+0.1);
        o.frequency.exponentialRampToValueAtTime(f0*0.15,t+1.6);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(mv*0.065,t+0.04);
        g.gain.setValueAtTime(mv*0.05,t+0.5); g.gain.exponentialRampToValueAtTime(0.001,t+1.7);
        let dist=makeDist(ac,6); o.connect(dist); dist.connect(g);
        connect(g, 0.3, 0.7); o.start(t); o.stop(t+1.8);
      }
    }

    // LAYER 9: Metallic bell pings
    {
      const pings=[1.0,3.75,6.5,9.25,11.5];
      pings.forEach(b=>{
        if(b>=DUR)return;
        let t=T+b; let freq=220*(1+Math.floor(Math.random()*3));
        let o=reg(ac.createOscillator()), g=ac.createGain();
        o.type='sine'; o.frequency.value=freq;
        let o2=reg(ac.createOscillator()), g2=ac.createGain();
        o2.type='sine'; o2.frequency.value=freq*2.76;
        g.gain.setValueAtTime(mv*0.09,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.8);
        g2.gain.setValueAtTime(mv*0.04,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.9);
        o.connect(g); connect(g, 0.3, 0.7); o2.connect(g2); connect(g2, 0.2, 0.8);
        o.start(t); o.stop(t+2.0); o2.start(t); o2.stop(t+1.1);
      });
    }

    // LAYER 10: Brown noise rumble
    {
      let len=Math.floor(ac.sampleRate*DUR);
      let buf=ac.createBuffer(1,len,ac.sampleRate);
      let d=buf.getChannelData(0); let prev=0;
      for(let i=0;i<len;i++){prev=(prev+(Math.random()*2-1)*0.08)*0.97; d[i]=prev*3.0;}
      let src=reg(ac.createBufferSource()); src.buffer=buf;
      let lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=90;
      let g=ac.createGain();
      g.gain.setValueAtTime(0,T); g.gain.linearRampToValueAtTime(mv*0.30,T+5.0);
      g.gain.setValueAtTime(mv*0.30,T+9.0); g.gain.linearRampToValueAtTime(mv*0.12,T+DUR);
      src.connect(lp); lp.connect(g); g.connect(ac.destination); src.start(T); src.stop(T+DUR+0.1);
    }
  }

  // Starts game music — full 12-second horror loop, plays continuously until stopped

    stopGameMusic();

    gameMusicPlaying=true;
    playScaryMusic();
    gameMusicInterval=setInterval(()=>{
      if(!gameMusicPlaying){clearInterval(gameMusicInterval);gameMusicInterval=null;return;}
      if((data.musicVol||0)>0)playScaryMusic();
    },12000);
  }

        let dx=nx-(o.x+(o.w||0)/2), dy=ny-(o.y+(o.h||0)/2);

  function crRes(cx,cy,cr,rx,ry,rw,rh){
    let cx2=Math.max(rx,Math.min(cx,rx+rw)),cy2=Math.max(ry,Math.min(cy,ry+rh)),dist=Math.hypot(cx-cx2,cy-cy2);
    if(dist<cr&&dist>0.001){let o=cr-dist;return{x:cx+(cx-cx2)/dist*o,y:cy+(cy-cy2)/dist*o}}return null;
  }
  function crResC(cx,cy,cr,ox,oy,or2){
    let dist=Math.hypot(cx-ox,cy-oy);
    if(dist<cr+or2&&dist>0.001){let o=cr+or2-dist;return{x:cx+(cx-ox)/dist*o,y:cy+(cy-oy)/dist*o}}return null;
  }
  function getSolids(){return worldObjs.filter(o=>o.solid);}
  function resolveCollisions(cx,cy,cr){
    for(let o of getSolids()){
      let r;
      if(o.type==='house'){
        let pad=4;
        r=crRes(cx,cy,cr,o.x-pad,o.y-pad,o.w+pad*2,o.h+pad*2);
      } else if(o.type==='debris'||o.type==='car'||o.type==='barrel'){
        r=crResC(cx,cy,cr,o.x,o.y,o.r||20);
      } else if(o.type==='rock'||o.type==='tree'){
        r=crResC(cx,cy,cr,o.x,o.y,o.r);
      } else if(o.type==='bench'){
        r=crResC(cx,cy,cr,o.x,o.y,18);
      } else if(o.type==='lamp'){
        r=crResC(cx,cy,cr,o.x,o.y,8);
      }
      if(r){cx=r.x;cy=r.y;}
    }
    for(let o of worldObjs){
      if(o.type==='water'){let r=crRes(cx,cy,cr,o.x,o.y,o.w,o.h);if(r){cx=r.x;cy=r.y;}}
    }
    return{x:cx,y:cy};
  }

  function doDash(){
    if(!dReady||dActive||gameState!==STATE.PLAYING)return;

      if(jAct){dx=jDX;dy=jDY;pLastDX=jDX;pLastDY=jDY;}
      else{dx=ljDX;dy=ljDY;}

    if(dx===0&&dy===0){
      if(keys['w']||keys['arrowup']||keys['KeyW']||keys['ArrowUp'])dy=-1;

    }

  function drawHUD(){
    if(gameState!==STATE.PLAYING)return;
    let ts=gameMode==='normal'?Math.max(0,Math.ceil(30-gt))+'s':Math.floor(gt)+'s';
    let timerIcon=gameMode==='endless'?'⏱':'⏳';
    let diffIcon=data.diff==='hard'?'🔥':data.diff==='nightmare'?'💀':data.diff==='easy'?'🌿':data.diff==='normal'?'🌕':'';
    let diffCol=data.diff==='hard'?'#ff4400':data.diff==='nightmare'?'#ff00ff':data.diff==='normal'?'#ffaa44':'#aaffaa';
    let items=[
      {icon:timerIcon,val:ts,col:gameMode==='endless'?'#88ddff':'#ff6666'},
      {icon:'🌙',val:`${night}/5`,col:'#ffddaa'},
      {icon:'🪙',val:`${data.coins}`,col:'#ffd700'},
      {icon:'💎',val:`${data.crystals}`,col:'#cc88ff'},
    ];
    if(diffIcon)items.splice(1,0,{icon:diffIcon,val:t(data.diff),col:diffCol});
    if(killerAbilityType==='dash')items.push({icon:'🔥',val:'DASH',col:'#ff5500'});
    else if(killerAbilityType==='blink')items.push({icon:'👁',val:'BLINK',col:'#cc00ff'});
    else if(killerAbilityType==='rage')items.push({icon:'😡',val:kAbility.active?'RAGE!':'RAGE',col:'#ff3300'});

    let pad=14, gap=10, fh=Math.round(H*0.038), ih=fh+pad*2;
    ctx.font=`bold ${fh}px 'Rajdhani',Arial`;
    let widths=items.map(it=>{
      let tw=ctx.measureText(it.icon+' '+it.val).width;
      return tw+pad*2;
    });
    let totalW=widths.reduce((a,b)=>a+b,0)+gap*(items.length-1)+pad*2;
    let barH=ih, barW=totalW;
    let bx=Math.round(W/2-barW/2), by=8;

    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.beginPath();ctx.roundRect(bx,by,barW,barH,barH/2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(bx,by,barW,barH,barH/2);ctx.stroke();

    let x=bx+pad;
    items.forEach((it,i)=>{
      if(i>0){
        ctx.fillStyle='rgba(255,255,255,0.15)';
        ctx.fillRect(x-gap/2-1,by+8,1.5,barH-16);
      }
      ctx.fillStyle=it.col;
      ctx.font=`bold ${fh}px 'Rajdhani',Arial`;
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.shadowColor=it.col;ctx.shadowBlur=8;
      ctx.fillText(it.icon+' '+it.val, x, by+barH/2);
      ctx.shadowBlur=0;
      x+=widths[i]+gap;
    });
    ctx.restore();
  }

      ctx.strokeStyle=`rgba(100,180,255,${0.12+Math.sin(fc*0.05+o.wobble)*0.08})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(sx+o.w/2,sy+o.h/2+wobble,o.w/2*0.55,o.h/2*0.55,0,0,Math.PI*2);ctx.stroke();

      if(o.toxic){
        ctx.fillStyle='rgba(80,255,0,0.1)';ctx.beginPath();ctx.arc(sx,sy,o.r*1.15,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(80,255,0,0.65)';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☣',sx,sy);

      ctx.fillStyle='rgba(255,255,255,0.1)';

    } else if(o.type==='car'){
      ctx.translate(sx,sy);ctx.rotate(o.ang);
      ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(-o.w/2+4,-o.h/2+4,o.w,o.h);
      ctx.fillStyle=o.color;ctx.fillRect(-o.w/2,-o.h/2,o.w,o.h);
      if(o.burned){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-o.w/2,-o.h/2,o.w,o.h);}
      ctx.fillStyle='rgba(0,60,100,0.4)';ctx.fillRect(-o.w*0.22,-o.h*0.46,o.w*0.44,o.h*0.38);
      ctx.fillStyle='#0a0a0a';
      let wx1=-o.w*0.33,wx2=o.w*0.33,wy1=-o.h*0.5-3,wy2=o.h*0.5+3;

      });

      if(o.burned){ctx.fillStyle='rgba(255,100,0,0.1)';ctx.fillRect(-o.w/2,-o.h/2,o.w/3,o.h);}
    } else if(o.type==='lamp'){
      let flickOn=o.on&&(!o.flicker||Math.sin((fc+o.flickerPhase)*0.3)>-0.3);
      ctx.strokeStyle='#383838';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(sx,sy+2);ctx.lineTo(sx,sy-26);ctx.lineTo(sx+11,sy-32);ctx.stroke();
      if(o.broken){ctx.save();ctx.translate(sx+11,sy-32);ctx.rotate(0.5);ctx.strokeStyle='#282828';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(8,-4);ctx.stroke();ctx.restore();}
      if(flickOn){
        ctx.fillStyle='rgba(255,230,100,0.15)';ctx.beginPath();ctx.arc(sx+11,sy-32,22,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffee80';
      }else{ctx.fillStyle='#333';}
      ctx.beginPath();ctx.arc(sx+11,sy-32,5,0,Math.PI*2);ctx.fill();

      ctx.translate(sx,sy);ctx.rotate(o.ang);

      ctx.fillStyle='#3a2410';ctx.fillRect(-o.w/2,-o.h/2-o.h*0.52,o.w,o.h*0.36);

  function drawGround(offX,offY){
    let tileSize=100;
    let startX=Math.floor(offX/tileSize)*tileSize;
    let startY=Math.floor(offY/tileSize)*tileSize;
    for(let tx=startX;tx<offX+W+tileSize;tx+=tileSize){
      for(let ty=startY;ty<offY+H+tileSize;ty+=tileSize){
        let idx=Math.floor(tx/tileSize)+Math.floor(ty/tileSize)*23;
        let v=idx%5;
        let col=v===0?'#090e09':v===1?'#0b100b':v===2?'#0a0f08':'#080d07';
        ctx.fillStyle=col;ctx.fillRect(tx-offX,ty-offY,tileSize,tileSize);
        if(idx%7===0){ctx.fillStyle='rgba(255,255,255,0.015)';ctx.fillRect(tx-offX+rndInt(0,95),ty-offY+rndInt(0,95),2,2);}
      }
    }
    // Draw static blood stains on ground
    bloodStains.forEach(s=>{
      let sx=s.x-offX, sy=s.y-offY;
      if(sx<-s.r*3||sx>W+s.r*3||sy<-s.r*3||sy>H+s.r*3)return;
      ctx.save();
      ctx.globalAlpha=s.alpha;
      if(s.type==='pool'){
        let g=ctx.createRadialGradient(sx,sy,0,sx,sy,s.r);
        g.addColorStop(0,`rgba(120,0,0,1)`);g.addColorStop(0.6,`rgba(80,0,0,0.7)`);g.addColorStop(1,`rgba(40,0,0,0)`);
        ctx.fillStyle=g;
        ctx.beginPath();ctx.ellipse(sx,sy,s.r,s.r*0.6,s.rot,0,Math.PI*2);ctx.fill();
      } else {
        // Splat with drips
        ctx.translate(sx,sy);ctx.rotate(s.rot);
        ctx.fillStyle='rgba(100,0,0,0.9)';
        ctx.beginPath();ctx.arc(0,0,s.r*0.5,0,Math.PI*2);ctx.fill();
        for(let d=0;d<s.drops;d++){
          let ang=d/s.drops*Math.PI*2;
          let len=s.r*(0.4+Math.random()*0.6);
          let ex=Math.cos(ang)*len, ey=Math.sin(ang)*len;
          ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(ex,ey);
          ctx.strokeStyle='rgba(90,0,0,0.7)';ctx.lineWidth=2+Math.random()*3;ctx.stroke();
          ctx.fillStyle='rgba(80,0,0,0.8)';ctx.beginPath();ctx.arc(ex,ey,2+Math.random()*4,0,Math.PI*2);ctx.fill();
        }
      }
      ctx.restore();
    });
    ctx.globalAlpha=1;
    ctx.strokeStyle='#3a0000';ctx.lineWidth=8;
    ctx.strokeRect(-offX+4,-offY+4,MW-8,MH-8);
    ctx.strokeStyle='rgba(120,0,0,0.3)';ctx.lineWidth=4;
    ctx.strokeRect(-offX+12,-offY+12,MW-24,MH-24);
  }

    ctx.beginPath();ctx.moveTo(cx-s+8,cy);ctx.lineTo(cx+s-8,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-s+8);ctx.lineTo(cx,cy+s-8);ctx.stroke();
    ctx.fillStyle=v.outer;ctx.fillRect(cx-10,cy-14,20,20);
    ctx.strokeStyle=v.outer;ctx.lineWidth=3.5;ctx.beginPath();ctx.arc(cx,cy-14,9,Math.PI,0);ctx.stroke();

      ctx.strokeStyle=vs.outer;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx-ss+8,cy);ctx.lineTo(cx+ss-8,cy);ctx.stroke();
      let lidY=-prog*100;
      ctx.fillStyle=vs.outer;ctx.beginPath();ctx.roundRect(cx-ss,cy-ss+lidY,ss*2,28,6);ctx.fill();
      let bAlpha=prog*0.8;
      ctx.fillStyle=`rgba(255,220,80,${bAlpha})`;ctx.beginPath();ctx.arc(cx,cy,ss*prog*1.2,0,Math.PI*2);ctx.fill();

  function btn(text,x,y,w,h,color,hoverColor,tcol,fs){
    tcol=tcol||'#fff';fs=fs||"bold 18px 'Rajdhani',Arial";
    // Visual hover only when cursor is over AND no slider is being dragged
    let hv=mX>=x&&mX<=x+w&&mY>=y&&mY<=y+h&&!dragSlider;
    ctx.fillStyle=hv?hoverColor:color;
    ctx.beginPath();let r=10;
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=tcol;ctx.font=fs;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x+w/2,y+h/2);
    // Hit = press STARTED inside this button (mPressX/mPressY) and not yet consumed, no slider active
    let hit=mD&&!mH&&!dragSlider&&mPressX>=x&&mPressX<=x+w&&mPressY>=y&&mPressY<=y+h;
    return hit;
  }

  function drawBloodyTitle(text, cx, y, customFs){
    ctx.save();
    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    let fs=customFs||Math.round(H*0.105);
    ctx.font=`bold ${fs}px Impact`;

    // Measure each character to position drips accurately
    let chars=[...text];
    let totalW=ctx.measureText(text).width;
    let startX=cx-totalW/2;

    // Draw glow layers
    for(let i=3;i>=0;i--){
      ctx.shadowColor='#aa0000';ctx.shadowBlur=16+i*12;
      ctx.fillStyle=`rgba(160,0,0,${0.12+i*0.08})`;
      ctx.fillText(text,cx,y);
    }
    ctx.shadowBlur=0;

    // Draw blood drips FROM the bottom of each character
    ctx.save();
    // clip drips to below the text baseline
    ctx.beginPath();ctx.rect(cx-totalW/2-20, y+1, totalW+40, H);ctx.clip();
    let charX=startX;
    chars.forEach((ch,ci)=>{
      let cw=ctx.measureText(ch).width;
      let midX=charX+cw/2;
      // 1-3 drips per character
      let nd=ch===' '?0:1+Math.floor(Math.random()*0);// deterministic: use ci
      nd=ci%3===0?2:1;
      for(let d=0;d<nd;d++){
        let ox=cw*(d===0?0.25:0.72);
        let dx=charX+ox;
        // drip length varies per character+drip, animated
        let seed=ci*7+d*3;
        let dripH=10+((seed*13+17)%18)+Math.sin(fc*0.04+seed)*5;
        let dripR=2+((seed*5)%3);
        let w=dripR;
        ctx.beginPath();
        ctx.moveTo(dx-w*0.5,y+2);
        ctx.bezierCurveTo(dx-w,y+dripH*0.4, dx-w*1.1,y+dripH*0.8, dx,y+dripH+dripR);
        ctx.bezierCurveTo(dx+w*1.1,y+dripH*0.8, dx+w,y+dripH*0.4, dx+w*0.5,y+2);
        ctx.closePath();
        let dg=ctx.createLinearGradient(dx,y,dx,y+dripH);
        dg.addColorStop(0,'#cc0000');dg.addColorStop(1,'#660000');
        ctx.fillStyle=dg;ctx.fill();
        // Drop at bottom
        ctx.beginPath();ctx.arc(dx,y+dripH+dripR,dripR,0,Math.PI*2);
        let dg2=ctx.createRadialGradient(dx-dripR*0.3,y+dripH+dripR-dripR*0.3,0,dx,y+dripH+dripR,dripR);
        dg2.addColorStop(0,'#ff2222');dg2.addColorStop(1,'#770000');
        ctx.fillStyle=dg2;ctx.fill();
      }
      charX+=cw;
    });
    ctx.restore();

    // Main text on top of drips
    let tgrad=ctx.createLinearGradient(cx-totalW/2,y-fs,cx+totalW/2,y);
    tgrad.addColorStop(0,'#ff2222');tgrad.addColorStop(0.35,'#cc0000');tgrad.addColorStop(0.7,'#ee0000');tgrad.addColorStop(1,'#991111');
    ctx.fillStyle=tgrad;ctx.shadowColor='#ff0000';ctx.shadowBlur=10;
    ctx.fillText(text,cx,y);
    ctx.shadowBlur=0;

    ctx.restore();
  }

            if(mD&&!mH&&conf){data.crystals-=cr.priceCryst;data[`crates${cr.key.charAt(0).toUpperCase()+cr.key.slice(1)}`]++;save();buyModalCrateKey=null;buyModalStep=0;mH=true;}
            let back2=btn('← '+(currentLang==='ru'?'Назад':currentLang==='uk'?'Назад':currentLang==='zh'?'返回':'Back'),mx2+24,my2+164,mw-48,40,'#2a1a1a','#4a2a2a','#ff8888',"bold 15px 'Rajdhani',Arial");
            if(mD&&!mH&&back2){buyModalStep=0;mH=true;}
          }
        }
      }

      let back=btn(t('back'),W/2-140,Math.round(H*0.875),280,46,'#181818','#282828','#ccc',`bold ${Math.round(H*0.021)}px 'Rajdhani',Arial`);
      if(mD&&!mH&&back&&!buyModalCrateKey){gameState=STATE.MENU;buyModalCrateKey=null;buyModalStep=0;mD=false;mH=true;}
    }
    else if(gameState===STATE.PLAYING||gameState===STATE.GAMEOVER||gameState===STATE.WIN){
      camX=Math.max(0,Math.min(MW-W,p.x-W/2));
      camY=Math.max(0,Math.min(MH-H,p.y-H/2));

      drawGround(camX,camY);
      // Difficulty fog overlay
      if(data.diff==='normal'){
        let pulse=Math.sin(fc*0.025)*0.03;
        let fg=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,Math.max(W,H)*0.78);
        fg.addColorStop(0,'rgba(0,0,0,0)');
        fg.addColorStop(0.65,`rgba(60,20,0,${0.07+pulse})`);
        fg.addColorStop(1,`rgba(40,10,0,${0.12+pulse})`);
        ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);
      } else if(data.diff==='hard'||data.diff==='nightmare'){
        let fogAlpha=data.diff==='nightmare'?0.22:0.13;
        let pulse=Math.sin(fc*0.04)*0.04;
        let fg=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,Math.max(W,H)*0.75);
        fg.addColorStop(0,'rgba(0,0,0,0)');
        fg.addColorStop(0.6,`rgba(120,0,0,${(fogAlpha+pulse)*0.5})`);
        fg.addColorStop(1,`rgba(80,0,0,${fogAlpha+pulse})`);
        ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);
      }

      let belowTypes=['water','puddle','fence','debris','campfire','grave'];
      worldObjs.filter(o=>belowTypes.includes(o.type)).forEach(o=>drawWorldObj(o,camX,camY));
      worldObjs.filter(o=>!belowTypes.includes(o.type)&&o.type!=='tree').forEach(o=>drawWorldObj(o,camX,camY));

      amb.forEach(a=>{ctx.fillStyle=`rgba(255,0,0,${a.life/a.ml*0.07})`;ctx.beginPath();ctx.arc(a.x-camX,a.y-camY,a.sz,0,Math.PI*2);ctx.fill();});

      parts.forEach(q=>{ctx.fillStyle=q.c.replace('1)',`${q.life/q.ml})`).replace('rgb','rgba');ctx.beginPath();ctx.arc(q.x-camX,q.y-camY,q.rad*(q.life/q.ml),0,Math.PI*2);ctx.fill();});
      // Blood - clip to gameplay area (below HUD)
      ctx.save();
      ctx.beginPath();ctx.rect(0,56,W,H-56);ctx.clip();
      blood.forEach(b=>{
        let bsx=b.x-camX, bsy=b.y-camY;
        if(bsx<-b.rad*3||bsx>W+b.rad*3||bsy<-b.rad*3||bsy>H+b.rad*3)return;
        let alpha=b.life/b.ml;
        let r=b.rad*(0.5+alpha*0.5);
        // Elongate in direction of movement for realistic splatter
        let spd=Math.hypot(b.vx,b.vy);
        ctx.save();
        if(spd>0.3){
          let ang=Math.atan2(b.vy,b.vx);
          ctx.translate(bsx,bsy);
          ctx.rotate(ang);
          let stretch=Math.min(1+spd*0.18,2.8);
          let g=ctx.createRadialGradient(-r*0.2,0,0,0,0,r*stretch);
          g.addColorStop(0,`rgba(200,15,15,${alpha})`);
          g.addColorStop(0.5,`rgba(140,8,8,${alpha*0.9})`);
          g.addColorStop(1,`rgba(80,0,0,0)`);
          ctx.fillStyle=g;
          ctx.beginPath();ctx.ellipse(0,0,r*stretch,r*0.72,0,0,Math.PI*2);ctx.fill();
        } else {
          // Settled drop — round with gradient
          let g=ctx.createRadialGradient(bsx-r*0.3,bsy-r*0.3,0,bsx,bsy,r);
          g.addColorStop(0,`rgba(210,20,20,${alpha})`);
          g.addColorStop(0.6,`rgba(150,10,10,${alpha*0.85})`);
          g.addColorStop(1,`rgba(60,0,0,${alpha*0.3})`);
          ctx.fillStyle=g;
          ctx.beginPath();ctx.arc(bsx,bsy,r,0,Math.PI*2);ctx.fill();
          // Tiny highlight
          if(r>2&&alpha>0.5){ctx.fillStyle=`rgba(255,120,120,${alpha*0.25})`;ctx.beginPath();ctx.arc(bsx-r*0.3,bsy-r*0.3,r*0.32,0,Math.PI*2);ctx.fill();}
        }
        ctx.restore();
      });
      ctx.restore(); // end blood clip

      // Player dash afterimage trail
      if(pDashTrail.length>0){
        let f=data.fighter;
        let c1=f==='pushkin'?'255,220,0':f==='toxic'?'80,255,0':'0,220,255';
        let c2=f==='pushkin'?'255,140,0':f==='toxic'?'0,200,40':'0,80,255';
        pDashTrail.forEach((tr,i)=>{
          let alpha=0.2+(i/pDashTrail.length)*0.75;
          let sc=0.5+0.6*(i/pDashTrail.length);
          ctx.save();
          ctx.globalAlpha=alpha;
          ctx.translate(tr.x-camX,tr.y-camY);
          let gr=ctx.createRadialGradient(0,0,p.r*0.05,0,0,p.r*sc*1.8);
          gr.addColorStop(0,`rgba(${c1},1)`);
          gr.addColorStop(0.4,`rgba(${c1},0.85)`);
          gr.addColorStop(0.75,`rgba(${c2},0.5)`);
          gr.addColorStop(1,`rgba(${c2},0)`);
          ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,p.r*sc*1.8,0,Math.PI*2);ctx.fill();
          ctx.restore();
        });
      }
      drawP(p.x-camX,p.y-camY,p.r);

      if(k.poisoned){
        let cloudAlpha=0.2+Math.sin(fc*0.1)*0.1;
        ctx.fillStyle=`rgba(80,255,0,${cloudAlpha})`;
        for(let i=0;i<5;i++){
          let ca=fc*0.05+i*1.25;
          ctx.beginPath();ctx.arc(k.x-camX+Math.cos(ca)*30,k.y-camY+Math.sin(ca)*30,15,0,Math.PI*2);ctx.fill();
        }
      }

      // Killer dash afterimage trail
      if(kAbility.dashActive&&kAbility.trail&&kAbility.trail.length>0){
        kAbility.trail.forEach((tr,i)=>{
          let alpha=(i/kAbility.trail.length)*0.55;
          let sc=0.5+0.5*(i/kAbility.trail.length);
          ctx.save();
          ctx.globalAlpha=alpha;
          ctx.translate(tr.x-camX,tr.y-camY);
          let gr=ctx.createRadialGradient(0,0,k.r*0.1,0,0,k.r*sc*1.4);
          gr.addColorStop(0,'rgba(255,80,0,0.9)');
          gr.addColorStop(0.5,'rgba(200,20,0,0.6)');
          gr.addColorStop(1,'rgba(255,0,0,0)');
          ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,k.r*sc*1.4,0,Math.PI*2);ctx.fill();
          ctx.restore();
        });
      }
      // Difficulty: killer glow aura
      if(data.diff==='normal'){
        let ksx=k.x-camX,ksy=k.y-camY;
        let glowPulse=0.3+Math.sin(fc*0.06)*0.15;
        let gg=ctx.createRadialGradient(ksx,ksy,k.r*0.5,ksx,ksy,k.r*2.2);
        gg.addColorStop(0,`rgba(255,80,0,${glowPulse*0.22})`);
        gg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=gg;ctx.beginPath();ctx.arc(ksx,ksy,k.r*2.2,0,Math.PI*2);ctx.fill();
      } else if(data.diff==='hard'||data.diff==='nightmare'){
        let ksx=k.x-camX,ksy=k.y-camY;
        let glowPulse=0.4+Math.sin(fc*0.09)*0.3;
        let glowColor=data.diff==='nightmare'?`rgba(255,0,200,${glowPulse*0.35})`:`rgba(255,0,0,${glowPulse*0.28})`;
        let glowR=data.diff==='nightmare'?k.r*3.5:k.r*2.8;
        let gg=ctx.createRadialGradient(ksx,ksy,k.r*0.5,ksx,ksy,glowR);
        gg.addColorStop(0,glowColor);gg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=gg;ctx.beginPath();ctx.arc(ksx,ksy,glowR,0,Math.PI*2);ctx.fill();
      }
      drawK(k.x-camX,k.y-camY,k.r*(data.diff==='nightmare'?1.18:data.diff==='hard'?1.08:1.0));
      worldObjs.filter(o=>o.type==='tree').forEach(o=>drawWorldObj(o,camX,camY));

      drawMC();
      drawHUD();
      // Difficulty: proximity vignette when killer is close
      if(gameState===STATE.PLAYING&&data.diff!=='easy'){
        let kdist=Math.hypot(p.x-k.x,p.y-k.y);
        let dangerZone=data.diff==='nightmare'?400:data.diff==='hard'?280:220;
        if(kdist<dangerZone){
          let intensity=(1-kdist/dangerZone)*(data.diff==='normal'?0.22:0.45+Math.sin(fc*0.18)*0.2);
          let vColor=data.diff==='normal'?`rgba(140,50,0,${intensity})`:`rgba(180,0,0,${intensity})`;
          let vg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
          vg.addColorStop(0,'rgba(0,0,0,0)');
          vg.addColorStop(1,vColor);
          ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
        }
      }

      if(!data.mobile&&gameState===STATE.PLAYING){
        drawPCAbilities();
      }

      if(gameState===STATE.GAMEOVER||gameState===STATE.WIN){
        menuBackground();
        let iw=gameState===STATE.WIN;
        ctx.fillStyle='#ff2244';ctx.font=`bold ${Math.round(H*0.058)}px 'Rajdhani',Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.shadowColor='#ff0000';ctx.shadowBlur=20;
        ctx.fillText(iw?t('win'):t('lose'),W/2,H/2-H*0.13);
        ctx.shadowBlur=0;
        ctx.fillStyle='#fff';ctx.font=`${Math.round(H*0.028)}px 'Rajdhani',Arial`;
        ctx.fillText(`${t('timeSurvived')}: ${Math.floor(st)}s`,W/2,H/2-H*0.07);
        if(iw)ctx.fillText(`${t('earned')}: 🪙 +${gameEndCoins}  💎 +5`,W/2,H/2-H*0.025);
        else ctx.fillText(t('caught'),W/2,H/2-H*0.025);
        let btnW=Math.round(W*0.26),btnH=Math.round(H*0.086);
        let mh=btn(t('menuBtn'),W/2-btnW/2,H/2+H*0.04,btnW,btnH,'#1a1a3a','#2a2a5a');
        let rh=!iw?btn(t('retry'),W/2-btnW/2,H/2+H*0.15,btnW,btnH,'#1a3a1a','#2a5a2a'):false;
        if(mD&&!mH){
          if(mh){gameState=STATE.MENU;shake=0;mH=true;stopGameMusic();startMenuMelody();}
          else if(rh){reset(gameMode);gameState=STATE.INTRO;introTimer=0;mH=true;}
        }
      }
    }
    ctx.restore();
    if(!mD)mH=false;
  }

  function drawPCAbilities(){
    let bx=W-320, by=H-200;
    let btnR=48;
    let dx=bx,dy=by;
    ctx.save();
    ctx.beginPath();ctx.arc(dx,dy,btnR,0,Math.PI*2);
    ctx.fillStyle=dReady?'rgba(0,160,60,0.85)':'rgba(20,60,30,0.7)';ctx.fill();
    ctx.strokeStyle=dReady?'rgba(0,255,100,0.7)':'rgba(0,80,30,0.4)';ctx.lineWidth=3;ctx.stroke();
    if(!dReady){
      let fr=dCd/DASH_CD_FRAMES;
      ctx.beginPath();ctx.moveTo(dx,dy);ctx.arc(dx,dy,btnR,-Math.PI/2,-Math.PI/2+fr*Math.PI*2);ctx.closePath();
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
      ctx.fillStyle='#ffcc00';ctx.font="bold 13px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText((dCd/60).toFixed(1)+'s',dx,dy+24);
    }
    ctx.fillStyle=dReady?'#fff':'#aaa';ctx.font="bold 15px Arial";ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('DASH',dx,dy-10);ctx.font='20px Arial';ctx.fillText('⚡',dx,dy+12);
    ctx.restore();

    if(data.fighter!=='bogdan'){
      let ax=bx+120,ay=by;
      ctx.save();
      let aReady=data.fighter==='pushkin'?sReady:poisonReady;
      let aCd=data.fighter==='pushkin'?sCd:poisonCd;
      let aMaxCd=data.fighter==='pushkin'?STUN_CD_FRAMES:POISON_CD_FRAMES;
      ctx.beginPath();ctx.arc(ax,ay,btnR,0,Math.PI*2);
      ctx.fillStyle=aReady?'rgba(180,80,0,0.85)':'rgba(60,30,0,0.7)';ctx.fill();
      ctx.strokeStyle=aReady?'rgba(255,150,0,0.7)':'rgba(80,40,0,0.4)';ctx.lineWidth=3;ctx.stroke();
      if(!aReady){
        let fr=aCd/aMaxCd;
        ctx.beginPath();ctx.moveTo(ax,ay);ctx.arc(ax,ay,btnR,-Math.PI/2,-Math.PI/2+fr*Math.PI*2);ctx.closePath();
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
        ctx.fillStyle='#ffcc00';ctx.font="bold 13px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText((aCd/60).toFixed(1)+'s',ax,ay+24);
      }
      ctx.fillStyle=aReady?'#fff':'#aaa';ctx.font="bold 15px Arial";ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(data.fighter==='pushkin'?'STUN':'YAD',ax,ay-10);ctx.font='20px Arial';ctx.fillText(data.fighter==='pushkin'?'⚡':'☣️',ax,ay+12);
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font="11px 'Rajdhani',Arial";
      ctx.fillText('[E]',ax,ay+34);
      ctx.restore();
    }
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font="11px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('[SPACE]',bx,by+34);
  }



  function drawP(x,y,r){
    ctx.save();ctx.translate(x,y);
    let f=data.fighter;
    let grad=ctx.createRadialGradient(-r*0.2,-r*0.3,r*0.1,0,0,r);
    if(f==='pushkin'){grad.addColorStop(0,'#ffdd99');grad.addColorStop(0.5,'#cc8800');grad.addColorStop(1,'#663300');}
    else if(f==='toxic'){grad.addColorStop(0,'#aaff80');grad.addColorStop(0.5,'#44cc00');grad.addColorStop(1,'#226600');}
    else{grad.addColorStop(0,'#4df0ff');grad.addColorStop(0.5,'#00a8cc');grad.addColorStop(1,'#005f80');}
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-r*0.15,r*0.5,Math.PI*0.2,Math.PI*0.8);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-r*0.25,-r*0.1,r*0.16,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(r*0.25,-r*0.1,r*0.16,0,Math.PI*2);ctx.fill();
    if(f==='pushkin'){ctx.fillStyle='#ffcc00';ctx.font="bold 12px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🧠',0,r*0.7);}
    else if(f==='toxic'){ctx.fillStyle='#00ff00';ctx.font="bold 12px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☣️',0,r*0.7);}
    ctx.restore();
  }

  function drawK(x,y,r){
    ctx.save();ctx.translate(x,y);
    if(k.poisoned)ctx.rotate(fc*0.15);
    let grad=ctx.createRadialGradient(-r*0.15,-r*0.2,r*0.2,0,0,r);
    grad.addColorStop(0,'#2a2a2a');grad.addColorStop(0.6,'#0d0d0d');grad.addColorStop(1,'#030303');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#080808';ctx.beginPath();ctx.arc(0,-r*0.2,r*0.7,Math.PI,Math.PI*2);ctx.fill();
    let eyePulse=0.6+Math.sin(fc*0.08)*0.4;
    let e1=ctx.createRadialGradient(-r*0.22,-r*0.15,1,-r*0.22,-r*0.15,r*0.4);e1.addColorStop(0,`rgba(255,0,0,${eyePulse})`);e1.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=e1;ctx.beginPath();ctx.arc(-r*0.22,-r*0.15,r*0.4,0,Math.PI*2);ctx.fill();
    let e2=ctx.createRadialGradient(r*0.22,-r*0.15,1,r*0.22,-r*0.15,r*0.4);e2.addColorStop(0,`rgba(255,0,0,${eyePulse})`);e2.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=e2;ctx.beginPath();ctx.arc(r*0.22,-r*0.15,r*0.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f33';ctx.shadowColor='#f00';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(-r*0.22,-r*0.16,r*0.13,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(r*0.22,-r*0.16,r*0.13,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    if(k.stun&&!k.poisoned){ctx.fillStyle='rgba(255,200,0,0.5)';ctx.beginPath();ctx.arc(0,0,r*1.3,0,Math.PI*2);ctx.fill();}
    else if(k.poisoned){
      ctx.fillStyle='rgba(80,255,0,0.35)';ctx.beginPath();ctx.arc(0,0,r*1.4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(80,255,0,0.6)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.arc(0,0,r*1.6,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }
    if(killerAbilityType!=='none'){
      let pulse=0.5+Math.sin(fc*0.12)*0.5;
      if(killerAbilityType==='dash'){ctx.strokeStyle=`rgba(255,80,0,${0.3+pulse*0.4})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,r*1.5,0,Math.PI*2);ctx.stroke();}
      else if(killerAbilityType==='blink'){ctx.strokeStyle=`rgba(160,0,255,${0.3+pulse*0.5})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,r*1.5,0,Math.PI*2);ctx.stroke();let ox=Math.cos(fc*0.08)*r*1.8,oy=Math.sin(fc*0.08)*r*1.8;ctx.fillStyle=`rgba(180,0,255,${0.6+pulse*0.4})`;ctx.beginPath();ctx.arc(ox,oy,4,0,Math.PI*2);ctx.fill();}
      else if(killerAbilityType==='rage'){if(kAbility.active){ctx.fillStyle=`rgba(255,60,0,${0.25+pulse*0.2})`;ctx.beginPath();ctx.arc(0,0,r*1.6,0,Math.PI*2);ctx.fill();}else{ctx.strokeStyle=`rgba(255,100,0,${0.2+pulse*0.3})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,r*1.4,0,Math.PI*2);ctx.stroke();}}
    }
    ctx.restore();
  }

  function drawMC(){
    if(!data.mobile)return;
    let btnR=Math.round(H*0.092);
    JBX=W*0.14;
    JBY=H-H*0.38;
    JR=Math.round(H*0.24);
    // For bogdan (no ability button): DASH goes to far right
    // For other fighters: DASH is inner-right, ability is outer-right
    let hasAbility=data.fighter!=='bogdan';
    let dashOffsetX=hasAbility ? Math.round(W*0.04)+btnR*2+Math.round(W*0.025) : Math.round(W*0.04);
    DBX=W-btnR*2-dashOffsetX;
    DBY=H-btnR*2-Math.round(H*0.38);
    ABX=W-btnR*2-Math.round(W*0.04);
    ABY=H-btnR*2-Math.round(H*0.38);

    ctx.fillStyle='rgba(255,255,255,0.10)';ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(JBX,JBY,JR,0,Math.PI*2);ctx.fill();ctx.stroke();
    let tx=jAct?JBX+jDX*Math.round(JR*0.55):JBX,ty=jAct?JBY+jDY*Math.round(JR*0.55):JBY;
    ctx.shadowColor='rgba(255,255,255,0.5)';ctx.shadowBlur=12;
    ctx.fillStyle='rgba(255,255,255,0.90)';ctx.beginPath();ctx.arc(tx,ty,Math.round(JR*0.32),0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    let dcx=DBX+btnR,dcy=DBY+btnR;
    ctx.shadowColor=dReady?'rgba(0,255,100,0.7)':'rgba(0,80,30,0.3)';ctx.shadowBlur=dReady?16:5;
    ctx.beginPath();ctx.arc(dcx,dcy,btnR,0,Math.PI*2);
    ctx.fillStyle=dReady?'rgba(0,190,70,0.95)':'rgba(15,50,25,0.85)';ctx.fill();
    ctx.strokeStyle=dReady?'rgba(80,255,130,0.9)':'rgba(0,80,30,0.5)';ctx.lineWidth=3;ctx.stroke();
    ctx.shadowBlur=0;
    if(!dReady){
      let fr=dCd/DASH_CD_FRAMES;
      ctx.beginPath();ctx.moveTo(dcx,dcy);ctx.arc(dcx,dcy,btnR,-Math.PI/2,-Math.PI/2+fr*Math.PI*2);ctx.closePath();
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
      ctx.fillStyle='#ffcc00';ctx.font="bold 14px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText((dCd/60).toFixed(1)+'s',dcx,dcy+20);
    }
    ctx.fillStyle=dReady?'#fff':'#bbb';ctx.font="bold 15px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('DASH',dcx,dcy-12);ctx.font='22px Arial';ctx.fillText('⚡',dcx,dcy+11);

    if(data.fighter!=='bogdan'){
      let acx=ABX+btnR,acy=ABY+btnR;
      let aReady=data.fighter==='pushkin'?sReady:poisonReady;
      let aCd=data.fighter==='pushkin'?sCd:poisonCd;
      let aMaxCd=data.fighter==='pushkin'?STUN_CD_FRAMES:POISON_CD_FRAMES;
      ctx.shadowColor=aReady?(data.fighter==='pushkin'?'rgba(255,150,0,0.7)':'rgba(120,255,0,0.7)'):'rgba(0,0,0,0.2)';ctx.shadowBlur=aReady?16:4;
      ctx.beginPath();ctx.arc(acx,acy,btnR,0,Math.PI*2);
      ctx.fillStyle=aReady?(data.fighter==='pushkin'?'rgba(230,90,0,0.95)':'rgba(90,170,0,0.95)'):data.fighter==='pushkin'?'rgba(55,20,0,0.85)':'rgba(18,48,0,0.85)';ctx.fill();
      ctx.strokeStyle=aReady?(data.fighter==='pushkin'?'rgba(255,160,60,0.9)':'rgba(140,255,60,0.9)'):data.fighter==='pushkin'?'rgba(80,40,0,0.5)':'rgba(40,80,0,0.5)';ctx.lineWidth=3;ctx.stroke();
      ctx.shadowBlur=0;
      if(!aReady){
        let fr=aCd/aMaxCd;
        ctx.beginPath();ctx.moveTo(acx,acy);ctx.arc(acx,acy,btnR,-Math.PI/2,-Math.PI/2+fr*Math.PI*2);ctx.closePath();
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
        ctx.fillStyle='#ffcc00';ctx.font="bold 14px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText((aCd/60).toFixed(1)+'s',acx,acy+20);
      }
      ctx.fillStyle=aReady?'#fff':'#bbb';ctx.font="bold 14px 'Rajdhani',Arial";ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(data.fighter==='pushkin'?'STUN':'YAD',acx,acy-12);ctx.font='22px Arial';ctx.fillText(data.fighter==='pushkin'?'⚡':'☣️',acx,acy+11);

  }

  // ============================================================
  // INPUT SYSTEM
  // Core principle: buttons fire only when the press STARTED
  // inside them. Moving mouse/finger onto a button after pressing
  // elsewhere does NOT trigger it. One slider at a time.
  // ============================================================
  let mX=W/2,mY=H/2;   // current pointer position (canvas coords)
  let mPressX=-1,mPressY=-1; // where the press STARTED
  let mD=false,mH=false; // mD=press active, mH=already handled
  const keys={};

  // Slider state — only one active at a time, identified by source ('mouse' or touch id number)
  let dragSlider=null;       // 'sound' | 'music' | null
  let dragSliderTouchId=null; // 'mouse' | touch.identifier | null

  function remapTouch(clientX, clientY, r){
    let isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
    let vw = (window.visualViewport ? window.visualViewport.width  : window.innerWidth)  || window.innerWidth;
    let vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) || window.innerHeight;
    let angle = 0;
    try{
      if(screen.orientation && screen.orientation.angle !== undefined) angle = screen.orientation.angle;
      else if(window.orientation !== undefined) angle = Math.abs(window.orientation);
    }catch(e){}
    let dimPortrait = vw < vh;
    let angPortrait = (angle === 0 || angle === 180);
    let portrait = Math.abs(vw - vh) < Math.max(vw, vh) * 0.20 ? angPortrait : dimPortrait;
    let doRotate = isTouch && portrait;
    if(doRotate){
      let scale=Math.min(vh/960, vw/540);
      let sw=960*scale, sh=540*scale;
      let left=Math.round(sh/2-vh/2);
      let top =Math.round(vw/2-sw/2);
      let rx=clientX-left;
      let ry=clientY-top;
      let ux=ry/scale;
      let uy=(sw-rx)/scale;
      ux=Math.max(0,Math.min(960,ux));
      uy=Math.max(0,Math.min(540,uy));
      return{tx:ux,ty:uy};
    } else {
      let tx=(clientX-r.left)*(960/r.width);
      let ty=(clientY-r.top)*(540/r.height);
      return{tx,ty};
    }
  }

  // Helper: slider geometry (matches render)
  function sliderGeom(){
    const totalLangW=W-40,slabelW=90,slW=totalLangW-slabelW-46,sl1X=20+slabelW,slH=14;
    const secYapprox=38+18+36+8+18+36+8+18+36+8;
    const sfxY=secYapprox+4, musY=sfxY+slH+14;
    return {sl1X,slW,slH,sfxY,musY};
  }
  function applySlider(name,px){
    const {sl1X,slW}=sliderGeom();
    let v=Math.max(0,Math.min(1,(px-sl1X)/slW));
    if(name==='sound'){data.soundVol=v;}
    if(name==='music'){data.musicVol=v;}
    save();
  }
  function hitSlider(px,py){
    if(gameState!==STATE.SETTINGS)return null;
    const {sl1X,slW,slH,sfxY,musY}=sliderGeom();
    if(py>=sfxY-20&&py<=sfxY+slH+20&&px>=sl1X-20&&px<=sl1X+slW+20)return 'sound';
    if(py>=musY-20&&py<=musY+slH+20&&px>=sl1X-20&&px<=sl1X+slW+20)return 'music';
    return null;
  }

  // ---- MOUSE ----
  canvas.addEventListener('mousemove',e=>{
    let r=canvas.getBoundingClientRect();
    let {tx:_mx,ty:_my}=remapTouch(e.clientX,e.clientY,r);
    mX=_mx;mY=_my;
    if(dragSlider&&dragSliderTouchId==='mouse'){applySlider(dragSlider,mX);}
  });

  canvas.addEventListener('mousedown',e=>{
    let r=canvas.getBoundingClientRect();
    let {tx:cx,ty:cy}=remapTouch(e.clientX,e.clientY,r);
    mX=cx;mY=cy;mPressX=cx;mPressY=cy;mD=true;mH=false;
    getAudioCtx();
    // PC ability buttons during gameplay
    if(!data.mobile&&gameState===STATE.PLAYING){
      let bx=W-320,by=H-200,btnR=48;
      if(Math.hypot(cx-bx,cy-by)<btnR+8){doDash();mH=true;return;}
      if(data.fighter!=='bogdan'){let ax=bx+120,ay=by;if(Math.hypot(cx-ax,cy-ay)<btnR+8){if(data.fighter==='pushkin')doStun();else if(data.fighter==='toxic')doPoison();mH=true;return;}}
    }
    // Slider capture — only if no slider already active
    if(dragSliderTouchId===null){
      let s=hitSlider(cx,cy);
      if(s){dragSlider=s;dragSliderTouchId='mouse';applySlider(s,cx);mH=true;}
    }
  });

  canvas.addEventListener('mouseup',()=>{
    mD=false;

  });

  // ---- TOUCH ----
  let jTouchId=null; // joystick touch
  let menuTouchId=null; // the one touch used for menu taps

  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    getAudioCtx();
    let r=canvas.getBoundingClientRect();
    Array.from(e.changedTouches).forEach(touch=>{
      let {tx,ty}=remapTouch(touch.clientX,touch.clientY,r);
      // Gameplay controls
      if(data.mobile&&gameState===STATE.PLAYING){
        let btnR=Math.round(H*0.092);
        let dcx=DBX+btnR,dcy=DBY+btnR,acx=ABX+btnR,acy=ABY+btnR;
        if(Math.hypot(tx-dcx,ty-dcy)<btnR+18){doDash();return;}
        if(data.fighter!=='bogdan'&&Math.hypot(tx-acx,ty-acy)<btnR+18){if(data.fighter==='pushkin')doStun();else if(data.fighter==='toxic')doPoison();return;}
        if(jTouchId===null&&Math.hypot(tx-JBX,ty-JBY)<JR+70){jTouchId=touch.identifier;jAct=true;let len=Math.hypot(tx-JBX,ty-JBY)||1;jDX=(tx-JBX)/len;jDY=(ty-JBY)/len;ljDX=jDX;ljDY=jDY;return;}
        return;
      }
      // Slider capture — one slider at a time
      if(dragSliderTouchId===null){
        let s=hitSlider(tx,ty);
        if(s){dragSlider=s;dragSliderTouchId=touch.identifier;applySlider(s,tx);return;}
      }
      // Menu tap — only one finger at a time
      if(menuTouchId===null){
        menuTouchId=touch.identifier;
        mX=tx;mY=ty;mPressX=tx;mPressY=ty;mD=true;mH=false;
      }
    });
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    let r=canvas.getBoundingClientRect();
    Array.from(e.touches).forEach(touch=>{
      let {tx,ty}=remapTouch(touch.clientX,touch.clientY,r);
      // Joystick
      if(data.mobile&&gameState===STATE.PLAYING){
        if(touch.identifier===jTouchId||(jTouchId===null&&(Math.hypot(tx-JBX,ty-JBY)<JR+80||jAct))){
          if(jTouchId===null)jTouchId=touch.identifier;
          jAct=true;let jdx=tx-JBX,jdy=ty-JBY,len=Math.hypot(jdx,jdy)||1;jDX=jdx/len;jDY=jdy/len;ljDX=jDX;ljDY=jDY;
        }
        return;
      }
      // Slider drag
      if(touch.identifier===dragSliderTouchId&&dragSlider){applySlider(dragSlider,tx);return;}
      // Menu pointer move — just update mX/mY for hover, don't change mPressX/mPressY
      if(touch.identifier===menuTouchId){mX=tx;mY=ty;}
    });
  },{passive:false});

  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    Array.from(e.changedTouches).forEach(touch=>{
      // Joystick release
      if(touch.identifier===jTouchId){jAct=false;jTouchId=null;jDX=0;jDY=0;}
      // Slider release
      if(touch.identifier===dragSliderTouchId){dragSlider=null;dragSliderTouchId=null;}

      if(touch.identifier===menuTouchId){
        menuTouchId=null;
