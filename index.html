      }
    });
  },{passive:false});

  window.addEventListener('keydown',e=>{
    keys[e.key.toLowerCase()]=true;
    keys[e.code]=true;
    if(e.code==='Space'||e.key===' '){if(document.activeElement&&document.activeElement.tagName==='INPUT')return;e.preventDefault();if(gameState===STATE.PLAYING)doDash();}
    if(e.code==='KeyE'){if(document.activeElement&&document.activeElement.tagName==='INPUT')return;e.preventDefault();if(gameState===STATE.PLAYING){if(data.fighter==='pushkin')doStun();else if(data.fighter==='toxic')doPoison();}}
    if(e.key==='Escape'){if(gameState===STATE.PLAYING){gameState=STATE.MENU;stopGameMusic();startMenuMelody();updUI();}}
  });
  window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;keys[e.code]=false;});

  function hRes(){
    // Use visualViewport if available (more reliable on Samsung/Android)
    let vw = (window.visualViewport ? window.visualViewport.width  : window.innerWidth)  || window.innerWidth;
    let vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) || window.innerHeight;
    let isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;

    // Determine portrait using both dimension comparison AND screen.orientation angle
    // Samsung sometimes has vw===vh briefly, or reports wrong innerWidth during rotation
    let angle = 0;
    try{
      if(screen.orientation && screen.orientation.angle !== undefined) angle = screen.orientation.angle;
      else if(window.orientation !== undefined) angle = Math.abs(window.orientation);
    }catch(e){}
    // portrait = dimensions say portrait OR angle is 0/180
    let dimPortrait = vw < vh;
    let angPortrait = (angle === 0 || angle === 180);
    // If dimensions are almost square (within 20%) trust the angle more
    let portrait;
    if(Math.abs(vw - vh) < Math.max(vw, vh) * 0.20){
      portrait = angPortrait;
    } else {
      portrait = dimPortrait;
    }

    let doRotate = isTouch && portrait;

    let hint = document.getElementById('rotate-hint');
    // On portrait touch: show hint AND still render game rotated
    if(isTouch && portrait){
      let rhText = document.getElementById('rh-text');
      if(rhText){
        rhText.innerHTML = currentLang==='uk' ? 'Поверни телефон горизонтально' :
          currentLang==='en' ? 'Rotate your phone to landscape' :
          currentLang==='zh' ? '请旋转手机' :
          'Поверни телефон горизонтально';
      }
      hint.classList.add('show');
    } else {
      hint.classList.remove('show');
    }

    if(doRotate){
      let scale = Math.min(vh / 960, vw / 540);
      let sw = 960 * scale, sh = 540 * scale;
      let left = Math.round(sh / 2 - vh / 2);
      let top  = Math.round(vw / 2 - sw / 2);
      wrapper.style.width  = '960px';
      wrapper.style.height = '540px';
      wrapper.style.left   = left + 'px';
      wrapper.style.top    = top  + 'px';
      wrapper.style.transformOrigin = '0 0';
      wrapper.style.transform = `rotate(90deg) scale(${scale})`;
    } else {
      let scale = Math.min(vw / 960, vh / 540);
      let sw = 960 * scale, sh = 540 * scale;
      wrapper.style.width  = '960px';
      wrapper.style.height = '540px';
      wrapper.style.left   = Math.round((vw - sw) / 2) + 'px';
      wrapper.style.top    = Math.round((vh - sh) / 2) + 'px';
      wrapper.style.transformOrigin = '0 0';
      wrapper.style.transform = `scale(${scale})`;
    }
  }

  // Robust orientation lock attempt
  (function tryLockOrientation(){
    try{
      if(screen.orientation && screen.orientation.lock){
        screen.orientation.lock('landscape').catch(()=>{});
      } else if(screen.lockOrientation){
        screen.lockOrientation('landscape');
      } else if(screen.mozLockOrientation){
        screen.mozLockOrientation('landscape');
      }
    }catch(e){}
  })();

  // Re-run hRes multiple times after orientation/resize to handle Samsung's delayed reflow
  function hResDelayed(){
    hRes();
    setTimeout(hRes, 100);
    setTimeout(hRes, 300);
    setTimeout(hRes, 600);
  }

  window.addEventListener('resize', hResDelayed);
  window.addEventListener('orientationchange', hResDelayed);
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', hRes);
  }
  // Also re-run on first touch in case the page loaded before resize fired
  document.addEventListener('touchstart', function onFirstTouch(){ hResDelayed(); document.removeEventListener('touchstart', onFirstTouch); }, {passive:true, once:true});
  hRes();

  function update(timestamp){
    let dt=lastTime?Math.min((timestamp-lastTime)/1000, 0.05):1/60;
    lastTime=timestamp;

    fc++;
    amb.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.life--;if(a.life<=0){a.x=Math.random()*MW;a.y=Math.random()*MH;a.life=a.ml;}});

    if(gameState===STATE.OPENING_CRATE&&cratePhase===1&&openAnim>0){
      openAnim--;
      if(openAnim<=0){cratePhase=2;mD=false;mH=true;}
    }
    if(toxicFlash>0){toxicFlash--;if(toxicFlash===0&&gameState===STATE.MENU)updUI();}
    if(gameState===STATE.INTRO){introTimer++;if(introTimer>=60){gameState=STATE.PLAYING;updUI();}return;}
    if(gameState===STATE.NIGHT_COMPLETE){
      nightTimer+=dt;
      if(nightTimer>2.5){
        let roll=Math.random();
        // 20% chance of no crate -> auto next night, otherwise: sm=48%, md=24%, lg=8%
        crateRewardType=roll<0.20?null:roll<0.68?'sm':roll<0.92?'md':'lg';
        if(crateRewardType===null){
          // No crate — skip straight to next night
          night++;if(night>5)night=5;
          reset('normal');gameState=STATE.INTRO;introTimer=0;
        } else {
          gameState=STATE.CRATE_REWARD;
        }
        nightTimer=0;updUI();
      }
      return;
    }
    if(gameState===STATE.CRATE_REWARD)return;
    if(gameState===STATE.GAMEOVER||gameState===STATE.WIN)return;
    if(gameState!==STATE.PLAYING)return;

    gt+=dt;
    st=gt;

    if(k.stun){k.stunT-=dt*60;if(k.stunT<=0){k.stun=false;}}
    if(k.poisoned){k.poisonSlowT-=dt*60;if(k.poisonSlowT<=0){k.poisoned=false;k.poisonSlowT=0;}}
    if(!dReady&&!dActive){dCd-=dt*60;if(dCd<=0){dReady=true;dCd=0;}}
    if(!sReady){sCd-=dt*60;if(sCd<=0){sReady=true;sCd=0;}}
    if(!poisonReady){poisonCd-=dt*60;if(poisonCd<=0){poisonReady=true;poisonCd=0;}}

    if(dActive){
      dT-=dt*60;
      // Record trail for afterimage
      pDashTrail.push({x:p.x,y:p.y,age:0});
      if(pDashTrail.length>8)pDashTrail.shift();
      // Substep dash with collision so player can't pass through walls
      let steps=4;
      let blocked=false;
      for(let s=0;s<steps;s++){
        let nx=p.x+dDX/steps, ny=p.y+dDY/steps;
        nx=Math.max(p.r,Math.min(MW-p.r,nx));ny=Math.max(p.r,Math.min(MH-p.r,ny));
        let rp=resolveCollisions(nx,ny,p.r);
        let moved=Math.hypot(rp.x-p.x,rp.y-p.y);
        p.x=rp.x;p.y=rp.y;
        if(moved<(DASH_SP/steps)*0.35){blocked=true;break;}
      }
      if(dT<=0||blocked){dActive=false;dDX=0;dDY=0;pDashTrail=[];}
    }else{
      let dx=0,dy=0;
      if(jAct){dx=jDX;dy=jDY;pLastDX=jDX;pLastDY=jDY;}
      else if(!data.mobile){
        if(keys['w']||keys['arrowup']||keys['KeyW']||keys['ArrowUp'])dy=-1;if(keys['s']||keys['arrowdown']||keys['KeyS']||keys['ArrowDown'])dy=1;
        if(keys['a']||keys['arrowleft']||keys['KeyA']||keys['ArrowLeft'])dx=-1;if(keys['d']||keys['arrowright']||keys['KeyD']||keys['ArrowRight'])dx=1;
      }
      if(dx!==0||dy!==0){let mag=Math.hypot(dx,dy);p.x+=(dx/mag)*p.sp;p.y+=(dy/mag)*p.sp;pLastDX=dx/mag;pLastDY=dy/mag;}
    }
    p.x=Math.max(p.r,Math.min(MW-p.r,p.x));p.y=Math.max(p.r,Math.min(MH-p.r,p.y));
    {let rp=resolveCollisions(p.x,p.y,p.r);p.x=rp.x;p.y=rp.y;}

    if(!k.stun){
      let dp=diffP();
      let nightNum=gameMode==='normal'?night:Math.floor(gt/30)+1;
      let baseSpeed;
      if(gameMode==='normal'){baseSpeed=dp.bs+(dp.ms-dp.bs)*(gt/30);}
      else{baseSpeed=Math.min(killerBaseSpeed(nightNum)+gt*0.004,killerMaxSpeed(nightNum));}
      k.sp=k.poisoned?baseSpeed*0.45:baseSpeed;

      if(killerAbilityType!=='none'){
        if(kAbility.cd>0)kAbility.cd-=dt*60;
        let kdist2=Math.hypot(p.x-k.x,p.y-k.y);
        if(killerAbilityType==='dash'){
          if(kAbility.dashActive){
            // Store afterimage trail positions
            if(!kAbility.trail)kAbility.trail=[];
            kAbility.trail.push({x:k.x,y:k.y,age:0});
            if(kAbility.trail.length>8)kAbility.trail.shift();
            k.x+=kAbility.dashDX*11;k.y+=kAbility.dashDY*11;kAbility.dashT-=dt*60;
            if(kAbility.dashT<=0){kAbility.dashActive=false;kAbility.cd=kAbility.maxCd;kAbility.trail=[];}
            spP(k.x,k.y,4,'rgb(255,60,0)',[2,6],[5,14]);
          } else if(kAbility.cd<=0&&kdist2<520){
            let ang2=Math.atan2(p.y-k.y,p.x-k.x);
            kAbility.dashDX=Math.cos(ang2);kAbility.dashDY=Math.sin(ang2);
            kAbility.dashActive=true;kAbility.dashT=night>=5?26:20;
            spP(k.x,k.y,22,'rgb(255,0,0)',[3,9],[10,28]);
          }
        }
        else if(killerAbilityType==='blink'){
          if(kAbility.cd<=0&&kdist2>150){
            let ang2=Math.atan2(p.y-k.y,p.x-k.x);
            let blinkFrac=night>=5?0.72:0.55;
            let blinkDist=Math.min(kdist2*blinkFrac,night>=5?420:300);
            k.x+=Math.cos(ang2)*blinkDist;k.y+=Math.sin(ang2)*blinkDist;
            k.x=Math.max(k.r,Math.min(MW-k.r,k.x));k.y=Math.max(k.r,Math.min(MH-k.r,k.y));
            kAbility.cd=kAbility.maxCd;
            spP(k.x,k.y,35,'rgb(180,0,255)',[2,9],[15,38]);
          }
        }
        else if(killerAbilityType==='rage'){
          if(!kAbility.active&&kAbility.cd<=0&&kdist2<600){
            kAbility.active=true;kAbility.rageT=night>=5?220:150;kAbility.cd=kAbility.maxCd;
            spP(k.x,k.y,28,'rgb(255,80,0)',[2,8],[12,30]);
          }
          if(kAbility.active){kAbility.rageT-=dt*60;if(kAbility.rageT<=0){kAbility.active=false;}else if(!k.poisoned){let rageBonus=night>=5?1.5:1.2;k.sp=baseSpeed+rageBonus;}}
        }
      }

      if(!kAbility.dashActive){
        let toX=p.x-k.x,toY=p.y-k.y;
        let dist0=Math.hypot(toX,toY);
        if(dist0>1){
          let dirX=toX/dist0,dirY=toY/dist0;
          let lookahead=k.r*4+k.sp*12;
          let avoidX=0,avoidY=0;
          for(let o of getSolids()){
            let ocx=o.x,ocy=o.y;
            let or2=(o.r||(Math.max(o.w||0,o.h||0)/2))+k.r+14;
            let ex=ocx-k.x,ey=ocy-k.y;
            let eDist=Math.hypot(ex,ey)||1;
            let proj=ex*dirX+ey*dirY;
            if(proj>-k.r&&proj<lookahead){
              let perpX=ex-proj*dirX,perpY=ey-proj*dirY;
              let perpD=Math.hypot(perpX,perpY)||1;
              if(perpD<or2){
                let strength=(or2-perpD)/or2;
                avoidX-=(perpX/perpD)*strength*2.2;avoidY-=(perpY/perpD)*strength*2.2;
              }
            }
            // Strong push if overlapping
            if(eDist<or2){
              let push=(or2-eDist)/or2;
              avoidX-=(ex/eDist)*push*3.5;avoidY-=(ey/eDist)*push*3.5;
            }
          }
          // Stuck detection — if barely moved for a while, teleport to 50% toward player
          if(!k.stuckTimer)k.stuckTimer=0;
          if(!k.stuckSec)k.stuckSec=0;
          let prevX=k.x,prevY=k.y;
          let moveX=dirX+avoidX,moveY=dirY+avoidY;
          if(k.stuckTimer>18){
            let ang=k.stuckAngle+(fc*0.08);
            moveX+=Math.cos(ang)*2.5;moveY+=Math.sin(ang)*2.5;
          }
          let mm=Math.hypot(moveX,moveY)||1;moveX/=mm;moveY/=mm;
          let nx=k.x+moveX*k.sp,ny=k.y+moveY*k.sp;
          nx=Math.max(k.r,Math.min(MW-k.r,nx));ny=Math.max(k.r,Math.min(MH-k.r,ny));
          let testPos=resolveCollisions(nx,ny,k.r);
          let moved=Math.hypot(testPos.x-prevX,testPos.y-prevY);
          if(moved<k.sp*0.3){
            k.stuckTimer++;
            k.stuckSec+=dt;
            if(k.stuckTimer===1)k.stuckAngle=Math.random()*Math.PI*2;
            // Teleport to 50% toward player after 5 seconds stuck
            if(k.stuckSec>=5){
              let tx2=k.x+(p.x-k.x)*0.5, ty2=k.y+(p.y-k.y)*0.5;
              tx2=Math.max(k.r,Math.min(MW-k.r,tx2));ty2=Math.max(k.r,Math.min(MH-k.r,ty2));
              let safe=resolveCollisions(tx2,ty2,k.r);
              k.x=safe.x;k.y=safe.y;
              k.stuckSec=0;k.stuckTimer=0;
              spP(k.x,k.y,35,'rgb(200,0,255)',[2,10],[18,42]);
            } else {
              let txOnly=resolveCollisions(k.x+moveX*k.sp,k.y,k.r);
              let tMovedX=Math.abs(txOnly.x-k.x);
              let tyOnly=resolveCollisions(k.x,k.y+moveY*k.sp,k.r);
              let tMovedY=Math.abs(tyOnly.y-k.y);
              if(tMovedX>tMovedY){k.x=txOnly.x;}else{k.y=tyOnly.y;}
            }
          }else{
            // Moving fine — decrease stuck timer, only fully reset stuckSec when timer clears completely
            k.stuckTimer=Math.max(0,k.stuckTimer-1);
            if(k.stuckTimer===0){k.stuckSec=0;}
            k.x=testPos.x;k.y=testPos.y;
          }
        }
      }
      k.x=Math.max(k.r,Math.min(MW-k.r,k.x));k.y=Math.max(k.r,Math.min(MH-k.r,k.y));
    }

    for(let i=parts.length-1;i>=0;i--){let q=parts[i];q.x+=q.vx;q.y+=q.vy;q.life-=dt*60;if(q.life<=0)parts.splice(i,1);}
    for(let i=blood.length-1;i>=0;i--){let b=blood[i];b.x+=b.vx;b.y+=b.vy;b.vy+=0.12;b.life-=dt*60;if(b.life<=0)blood.splice(i,1);}

    let dist=Math.hypot(p.x-k.x,p.y-k.y);
    if(dist<p.r+k.r-4 && !k.stun){
      spB(p.x,p.y);spP(p.x,p.y,30,'rgb(255,0,0)',[3,10],[15,40]);
      playSfx('hit');
      stopMelody();
      jAct=false;jTouchId=null;
      if(!gameEndSaved){gameEndSaved=true;gameEndCoins=0;save();}
      gameState=STATE.GAMEOVER;updUI();return;
    }
    shake=0;

    if(gameMode==='normal'&&gt>=30&&gameState===STATE.PLAYING){
      if(night<5){
        lb.push({nickname:data.nick,time:gt*night,date:new Date().toLocaleDateString()});
        if(lb.length>100)lb=lb.slice(-100);
        playSfx('nightdone');
        stopMelody();
        gameState=STATE.NIGHT_COMPLETE;nightTimer=0;
      } else {
        if(!gameEndSaved){gameEndSaved=true;data.wins++;gameEndCoins=1+Math.floor(Math.random()*50);data.coins+=gameEndCoins;data.crystals+=5;save();}
        stopMelody();
        gameState=STATE.WIN;
        lb.push({nickname:data.nick,time:gt*5,date:new Date().toLocaleDateString()});
        if(lb.length>100)lb=lb.slice(-100);
      }
      updUI();save();
    }
    updUI();
  }

  // ====== AUTH OVERLAY FUNCTIONS ======
  function showAuthOverlay(){
    document.getElementById('auth-overlay').style.display='flex';
    document.getElementById('game-wrapper').style.visibility='hidden';
  }
  function hideAuthOverlay(){
    document.getElementById('auth-overlay').style.display='none';
    document.getElementById('game-wrapper').style.visibility='visible';
    genWorld();updUI();startMenuMelody();
  }
  window.authTab=function(tab){
    ['login','register','forgot','reset'].forEach(t=>{
      let f=document.getElementById('form-'+t);
      if(f)f.style.display=(t===tab)?'':'none';
    });
    let tl=document.getElementById('tab-login');
    let tr=document.getElementById('tab-register');
    if(tl&&tr){
      tl.style.background=tab==='login'?'#6a0000':'#1a0008';
      tl.style.color=tab==='login'?'#ffaaaa':'#884444';
      tr.style.background=tab==='register'?'#003060':'#1a0008';
      tr.style.color=tab==='register'?'#88aaff':'#884444';
    }
    let tabBar=document.querySelector('#auth-box div:first-child');
    if(tabBar)tabBar.style.display=(tab==='forgot'||tab==='reset')?'none':'flex';
  };
  window.doLogin=async function(){
    let email=document.getElementById('li-email').value.trim();
    let pass=document.getElementById('li-pass').value;
    let errDiv=document.getElementById('li-err');
    let btn=document.getElementById('li-btn');
    errDiv.textContent='';
    if(!email||!pass){errDiv.textContent='Заполни все поля';return;}
    btn.textContent='...';btn.disabled=true;
    try{
      let r=await apiCall('POST','/api/login',{email,password:pass});
      _authToken=r.token;
      try{localStorage.setItem('killer_token',r.token);}catch(e){}
      applyServerData(r.data);
      updateNCText();
      hideAuthOverlay();
    }catch(e){
      errDiv.textContent=e.message||'Ошибка входа';
    }
    btn.textContent='ВОЙТИ';btn.disabled=false;
  };
  window.doRegister=async function(){
    let email=document.getElementById('re-email').value.trim();
    let nick=document.getElementById('re-nick').value.trim();
    let pass=document.getElementById('re-pass').value;
    let pass2=document.getElementById('re-pass2').value;
    let errDiv=document.getElementById('re-err');
    let btn=document.getElementById('re-btn');
    errDiv.textContent='';
    if(!email||!nick||!pass||!pass2){errDiv.textContent='Заполни все поля';return;}
    if(pass!==pass2){errDiv.textContent='Пароли не совпадают';return;}
    if(pass.length<6){errDiv.textContent='Пароль минимум 6 символов';return;}
    btn.textContent='...';btn.disabled=true;
    try{
      let r=await apiCall('POST','/api/register',{email,nick,password:pass});
      _authToken=r.token;
      try{localStorage.setItem('killer_token',r.token);}catch(e){}
      applyServerData(r.data);
      updateNCText();
      hideAuthOverlay();
    }catch(e){
      errDiv.textContent=e.message||'Ошибка регистрации';
    }
    btn.textContent='СОЗДАТЬ АККАУНТ';btn.disabled=false;
  };
  let _nickCheckTimer=null;
  let _reNickEl=document.getElementById('re-nick');
  if(_reNickEl)_reNickEl.addEventListener('input',function(){
    let v=this.value.trim();
    let st=document.getElementById('re-nick-status');
    clearTimeout(_nickCheckTimer);
    if(!v){st.textContent='';return;}
    if(v.length<2){st.style.color='#ff4466';st.textContent='Мин. 2 символа';return;}
    st.style.color='#888';st.textContent='Проверяю...';
    _nickCheckTimer=setTimeout(async function(){
      try{let r=await apiCall('POST','/api/check-nick',{nick:v});
        if(r.available){st.style.color='#44ff88';st.textContent='✓ Свободен';}
        else{st.style.color='#ff4466';st.textContent='✗ Занят';}
      }catch(e){st.textContent='';}
    },500);
  });
  window.doForgot=async function(){
    let email=document.getElementById('fo-email').value.trim();
    let errDiv=document.getElementById('fo-err');
    let btn=document.getElementById('fo-btn');
    errDiv.textContent='';
    if(!email){errDiv.textContent='Введи email';return;}
    btn.textContent='Отправляем...';btn.disabled=true;
    try{
      await apiCall('POST','/api/forgot',{email});
      document.getElementById('reset-email-hint').textContent=email;
      window._resetEmail=email;
      authTab('reset');
    }catch(e){
      errDiv.textContent=e.message||'Ошибка';
    }
    btn.textContent='ОТПРАВИТЬ КОД';btn.disabled=false;
  };
  window.doReset=async function(){
    let code=document.getElementById('rs-code').value.trim();
    let pass=document.getElementById('rs-pass').value;
    let pass2=document.getElementById('rs-pass2').value;
    let errDiv=document.getElementById('rs-err');
    let btn=document.getElementById('rs-btn');
    errDiv.textContent='';
    if(!code||!pass||!pass2){errDiv.textContent='Заполни все поля';return;}
    if(pass!==pass2){errDiv.textContent='Пароли не совпадают';return;}
    if(pass.length<6){errDiv.textContent='Пароль минимум 6 символов';return;}
    btn.textContent='...';btn.disabled=true;
    try{
      let r=await apiCall('POST','/api/reset',{email:window._resetEmail,code,newPassword:pass});
      _authToken=r.token;
      try{localStorage.setItem('killer_token',r.token);}catch(e){}
      applyServerData(r.data);
      updateNCText();
      hideAuthOverlay();
    }catch(e){
      errDiv.textContent=e.message||'Неверный код';
    }
    btn.textContent='СОХРАНИТЬ ПАРОЛЬ';btn.disabled=false;
  };
  function showNickInput(){
    let overlay=document.getElementById('nick-overlay');
    let input=document.getElementById('nick-input');
    let errDiv=document.getElementById('nick-error');
    let statusDiv=document.getElementById('nick-check-status');
    input.value=data.nick;
    errDiv.textContent='';statusDiv.textContent='';
    overlay.style.display='flex';
    setTimeout(function(){input.focus();},80);
    let _t=null;
    input.oninput=function(){
      let pos=this.selectionStart;
      let raw=this.value;
      let filtered=raw.replace(/[^\p{L}\p{N}]/gu,'');
      if(filtered!==raw){this.value=filtered;this.setSelectionRange(Math.min(pos,filtered.length),Math.min(pos,filtered.length));}
      errDiv.textContent='';
      let v=this.value.trim();
      clearTimeout(_t);
      if(!v||v===data.nick){statusDiv.textContent='';return;}
      statusDiv.style.color='#888';statusDiv.textContent='Проверяю...';
      _t=setTimeout(async function(){
        try{let r=await apiCall('POST','/api/check-nick',{nick:v});
          if(r.available){statusDiv.style.color='#44ff88';statusDiv.textContent='✓ Свободен';}
          else{statusDiv.style.color='#ff4466';statusDiv.textContent='✗ Занят';}
        }catch(e){statusDiv.textContent='';}
      },500);
    };
    input.onkeydown=function(e){
      if(e.key==='Enter'){e.preventDefault();window.confirmNick();}
      if(e.key==='Escape'){e.preventDefault();window.closeNickInput();}
    };
  }
  window.confirmNick=async function(){
    let input=document.getElementById('nick-input');
    let errDiv=document.getElementById('nick-error');
    let v=input.value.trim();
    if(!v||v.length<2){errDiv.textContent='Мин. 2 символа';return;}
    if(v===data.nick){document.getElementById('nick-overlay').style.display='none';return;}
    errDiv.textContent='Сохраняю...';
    try{
      let r=await apiCall('POST','/api/change-nick',{nick:v});
      data.nick=r.nick;save();
      errDiv.textContent='';
      document.getElementById('nick-overlay').style.display='none';
    }catch(e){
      errDiv.textContent=e.message||'Ошибка';
    }
  };
  window.closeNickInput=function(){
    document.getElementById('nick-overlay').style.display='none';
  };

  // genWorld/updUI/music вызываются в hideAuthOverlay() после успешного входа
  // Но loop должен крутиться всегда чтобы canvas не завис
  genWorld();

  function loop(timestamp){
    update(timestamp);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
